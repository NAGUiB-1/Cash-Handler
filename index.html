<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>دفتر المحل</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js" defer></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2317262b'/%3E%3Cpath d='M5 9l1.2-4h11.6L19 9' stroke='%23f2ecda' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M5 9a1.8 1.8 0 0 0 3.4.8 1.8 1.8 0 0 0 3.2 0 1.8 1.8 0 0 0 3.2 0A1.8 1.8 0 0 0 19 9' stroke='%23f2ecda' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M6 9.5V18a1 1 0 0 0 1 1h2.6v-4.6h4.8V19H17a1 1 0 0 0 1-1V9.5' stroke='%23f2ecda' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root {
    --ink: #17262b; --ink-08: rgba(23,38,43,0.06); --ink-10: rgba(23,38,43,0.10);
    --ink-15: rgba(23,38,43,0.15); --ink-20: rgba(23,38,43,0.20); --ink-40: rgba(23,38,43,0.45);
    --ink-60: rgba(23,38,43,0.65); --paper: #f2ecda; --paper-2: #e8dfc4;
    --emerald: #1f6f54; --steel: #35607a; --gold: #ad7a26; --rust: #a13a2a;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --tabbar-h: calc(65px + var(--safe-b));
    --actionbar-h: 54px;
    --actionbar-gap: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    touch-action: pan-x pan-y;
    -ms-touch-action: pan-x pan-y;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
  }
  body {
    background: var(--ink);
    display: flex;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    color: var(--ink);
  }
  button { font-family: inherit; cursor: pointer; }
  input:focus { border-color: var(--ink) !important; }
  .num { direction: ltr; font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; unicode-bidi: embed; }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }

  #shell {
    width: 100%; max-width: 480px; background: var(--paper);
    min-height: 100vh; min-height: 100svh; position: relative;
    overflow-x: hidden;
  }

  /* Header */
  .app-header {
    background: var(--ink); color: var(--paper);
    padding: 22px 18px 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
  }
  .app-header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; row-gap: 8px; }
  .app-header-logo {
    width: 38px; height: 38px; border-radius: 10px; background: var(--paper);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-header-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px; }
  .app-header-date { font-size: 12.5px; color: var(--paper); opacity: 0.65; white-space: nowrap; }
  .app-header-profit { margin-inline-start: auto; text-align: left; min-width: 0; }
  .app-header-profit-label { font-size: 11px; opacity: 0.6; white-space: nowrap; }
  .app-header-profit-value { font-size: 17px; font-weight: 700; white-space: nowrap; }

  .content { padding: 14px 16px calc(var(--tabbar-h) + var(--actionbar-h) + var(--actionbar-gap) + 24px); }

  /* Balance cards */
  .balance-grid-wrap { margin-bottom: 16px; }
  .balance-section-label { font-size: 12px; font-weight: 700; color: var(--ink-60); margin: 10px 2px 6px; }
  .balance-section-header { display: flex; align-items: center; justify-content: space-between; margin: 10px 2px 6px; }
  .toolbar-btn {
    background: #fff; border: 1px solid var(--ink-10); border-radius: 10px; padding: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .toolbar-btn:active { background: var(--ink-08); }
  .balance-collapsed-hint {
    font-size: 12px; color: var(--ink-40); background: #fff; border: 1px dashed var(--ink-15);
    border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 8px;
  }
  .balance-card-limit { font-size: 10.5px; font-weight: 600; margin-top: 4px; }
  .balance-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .balance-row-flex { display: flex; gap: 8px; }
  .balance-card {
    background: #fff; border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    flex: 1; min-width: 0;
  }
  .balance-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .balance-card-label {
    font-size: 11.5px; color: var(--ink-60); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .balance-card-value { font-size: 17px; font-weight: 700; color: var(--ink); }
  .balance-card-value.negative { color: var(--rust); }

  /* Fawry wide card */
  .fawry-card {
    background: #fff; border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    grid-column: 1 / -1;
  }
  .fawry-card-title {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13.5px; color: var(--ink);
    margin-bottom: 10px;
  }
  .fawry-card-subs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .fawry-sub { min-width: 0; text-align: center; }
  .fawry-sub:not(:first-child) { border-inline-start: 1px solid var(--ink-08); padding-inline-start: 10px; }
  .fawry-sub-label {
    font-size: 11px; color: var(--ink-60); font-weight: 600; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fawry-sub-value { font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .fawry-sub-value.negative { color: var(--rust); }

  /* Instapay wide card */
  .instapay-wide-card {
    background: #fff; border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    margin-bottom: 8px;
  }
  .instapay-wide-title {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13px; color: var(--ink);
    margin-bottom: 8px;
  }
  .instapay-subs { display: flex; gap: 8px; flex-wrap: wrap; }
  .instapay-sub-card {
    flex: 1; min-width: 100px; background: var(--paper); border-radius: 10px; padding: 8px 10px;
    border: 1px solid var(--ink-08);
  }
  .instapay-sub-label { font-size: 11px; color: var(--ink-60); font-weight: 600; margin-bottom: 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .instapay-sub-value { font-size: 14px; font-weight: 700; }
  .instapay-sub-value.negative { color: var(--rust); }

  /* Empty / start state */
  .empty-state { text-align: center; padding: 40px 10px; }
  .empty-state-icon {
    width: 64px; height: 64px; border-radius: 18px; background: #fff; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center; border: 1px solid var(--ink-10);
  }
  .empty-state-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 6px; }
  .empty-state-desc { font-size: 13.5px; color: var(--ink-60); margin-bottom: 22px; line-height: 1.6; }

  /* Primary button */
  .primary-btn {
    width: 100%; padding: 13px 16px; border-radius: 14px; border: none;
    background: var(--ink); color: var(--paper);
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 15.5px;
  }
  .primary-btn:disabled { background: var(--ink-20); cursor: default; }

  /* Transactions list header */
  .tx-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; row-gap: 6px; }
  .tx-list-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14.5px; }
  .tx-list-count { font-size: 12px; color: var(--ink-40); }
  .tx-list-box { background: #fff; border-radius: 16px; border: 1px solid var(--ink-10); padding: 4px 10px; }
  .tx-list-box.empty { padding: 20px; }
  .tx-list-empty { text-align: center; color: var(--ink-40); font-size: 13px; padding: 10px 0; }

  .tx-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--ink-08); }
  .tx-row:last-child { border-bottom: none; }
  .tx-row-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tx-row-body { flex: 1; min-width: 0; }
  .tx-row-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .tx-row-sub { font-size: 11.5px; color: var(--ink-40); }
  .tx-row-amt { text-align: left; }
  .tx-row-amt-val { font-size: 14.5px; font-weight: 700; }
  .tx-row-profit { font-size: 11px; color: var(--emerald); }
  .tx-row-commission { font-size: 11px; color: var(--rust); }
  .tx-row-actions { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; padding: 5px; display: flex; align-items: center; justify-content: center; }

  /* Floating action bar */
  .action-bar {
    position: fixed; bottom: calc(var(--tabbar-h) + var(--actionbar-gap)); left: 0; right: 0;
    display: flex; justify-content: center; z-index: 20;
    transform: translateZ(0); will-change: transform;
  }
  .action-bar-inner { width: 100%; max-width: 480px; padding: 0 16px; display: flex; gap: 10px; }
  .action-bar-add {
    flex: 1; min-height: var(--actionbar-h); background: var(--ink); color: var(--paper); border: none; border-radius: 14px; padding: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14.5px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  .action-bar-close {
    min-height: var(--actionbar-h); background: #fff; color: var(--ink); border: 1.5px solid var(--ink-15); border-radius: 14px;
    padding: 13px 16px; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px;
    white-space: nowrap;
  }

  /* Closed stamp */
  .closed-stamp {
    background: #fff; border-radius: 16px; padding: 18px 16px; margin-bottom: 16px; text-align: center;
  }
  .closed-stamp-badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 999px;
    transform: rotate(-3deg); font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 15px; margin-bottom: 10px;
  }
  .closed-stamp-sub { font-size: 12.5px; color: var(--ink-60); }
  .closed-stamp-diff { margin-top: 8px; font-size: 13px; }

  /* Sheets (modal) */
  .sheet-overlay { position: fixed; inset: 0; z-index: 50; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(15,20,22,0.55); }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; max-height: 88vh;
    background: var(--paper); border-top-left-radius: 22px; border-top-right-radius: 22px;
    display: flex; flex-direction: column; box-shadow: 0 -8px 30px rgba(0,0,0,0.35);
  }
  .sheet-grip-wrap { display: flex; justify-content: center; padding-top: 10px; }
  .sheet-grip { width: 40px; height: 4px; border-radius: 99px; background: var(--ink-20); }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
  .sheet-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px; color: var(--ink); }
  .sheet-close-btn {
    background: var(--ink-08); border: none; border-radius: 999px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .sheet-body { overflow-y: auto; padding: 4px 18px 18px; }
  .sheet-footer { padding: 12px 18px 20px; border-top: 1px solid var(--ink-10); }

  .field { margin-bottom: 14px; }
  .field-label { font-family: 'Tajawal', sans-serif; font-size: 13px; color: var(--ink-60); margin-bottom: 6px; font-weight: 600; }
  .input {
    width: 100%; box-sizing: border-box; border: 1.5px solid var(--ink-15); border-radius: 12px;
    padding: 11px 13px; font-size: 16px; font-family: 'Tajawal', sans-serif; background: #fff; color: var(--ink); outline: none;
    touch-action: manipulation;
  }
  .field-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .field-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .field-row { display: flex; gap: 10px; }
  .field-row > .field { flex: 1; }

  .chip-row { display: flex; gap: 8px; }
  .chip-row.wrap { flex-wrap: wrap; }
  .chip-btn {
    flex: 1; padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--ink-15);
    background: #fff; color: var(--ink); font-size: 13px; font-weight: 700; text-align: center;
  }
  .chip-btn.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .chip-btn.small { flex: none; padding: 9px 14px; font-size: 13.5px; font-weight: 600; }

  .subtype-btn {
    flex: 1; padding: 11px 8px; border-radius: 12px; border: 1.5px solid var(--ink-15);
    background: #fff; color: var(--ink-60); font-size: 13.5px; font-weight: 700;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .subtype-btn.withdraw.active { border-color: var(--steel); background: #e7ecef; color: var(--steel); }
  .subtype-btn.deposit.active { border-color: var(--emerald); background: #e4eeea; color: var(--emerald); }

  .warn-box { font-size: 13px; color: var(--rust); background: #f3e0da; padding: 12px; border-radius: 10px; margin-bottom: 14px; }
  .info-box { font-size: 13px; color: var(--steel); background: #e7ecef; padding: 12px; border-radius: 10px; margin-bottom: 14px; }

  .close-row { margin-bottom: 14px; background: #fff; border-radius: 14px; padding: 13px; border: 1px solid var(--ink-10); }
  .close-row-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .close-row-label { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .close-row-expected { font-size: 12px; color: var(--ink-60); }
  .close-row-diff { margin-top: 6px; font-size: 12.5px; }
  .close-intro { font-size: 12.5px; color: var(--ink-60); margin-bottom: 14px; line-height: 1.6; }

  /* Archive */
  .archive-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
  .archive-empty { text-align: center; color: var(--ink-40); font-size: 13px; padding: 40px 0; }
  .archive-list { background: #fff; border-radius: 16px; border: 1px solid var(--ink-10); overflow: hidden; }
  .archive-list-item {
    width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
    background: none; border: none; border-top: 1px solid var(--ink-08); text-align: right;
  }
  .archive-list-item:first-child { border-top: none; }
  .archive-list-item-date { font-size: 14px; font-weight: 600; color: var(--ink); }
  .archive-back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--ink-60); font-size: 13.5px; margin-bottom: 12px; }
  .archive-detail-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 16px; margin-bottom: 4px; }
  .archive-detail-sub { font-size: 12.5px; color: var(--ink-60); margin-bottom: 14px; }
  .section-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px; margin: 14px 0 8px; }

  /* Services view */
  .services-list { background: #fff; border-radius: 16px; border: 1px solid var(--ink-10); overflow: hidden; margin-bottom: 20px; }
  .services-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--ink-08); }
  .services-row:first-child { border-top: none; }
  .services-row-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--ink); }
  .services-row-input { width: 100%; box-sizing: border-box; border: 1.5px solid var(--ink-15); border-radius: 12px; padding: 6px 10px; font-size: 16px; font-family: 'Tajawal', sans-serif; }
  .services-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .add-btn { display: flex; align-items: center; gap: 5px; background: var(--ink); color: var(--paper); border: none; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
  .services-empty { padding: 18px; text-align: center; color: var(--ink-40); font-size: 13px; }

  /* Tab bar */
  .tab-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; z-index: 30;
    transform: translateZ(0); will-change: transform;
  }
  .tab-bar {
    width: 100%; max-width: 480px; min-height: var(--tabbar-h); background: var(--ink); display: flex;
    padding: 8px 10px calc(8px + var(--safe-b)); border-top-left-radius: 18px; border-top-right-radius: 18px;
  }
  .tab-btn {
    flex: 1; min-width: 0; background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 0; color: rgba(242,236,218,0.45); position: relative;
  }
  .tab-btn.active { color: var(--paper); }
  .tab-btn-label { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .tab-btn-dot { position: absolute; top: 2px; left: calc(50% + 8px); width: 6px; height: 6px; border-radius: 99px; background: var(--emerald); }

  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; gap: 12px; }
  .loading-text { font-family: 'Tajawal', sans-serif; color: var(--ink-40); font-size: 14px; }

  .tx-row-title, .services-row-name, .close-row-label, .archive-list-item-date,
  .balance-card-label, .empty-state-desc { overflow-wrap: anywhere; word-break: break-word; }
  .close-row-top { flex-wrap: wrap; row-gap: 4px; }

  @media (max-width: 360px) {
    .app-header { padding: 18px 14px 16px; }
    .app-header-title { font-size: 16.5px; }
    .app-header-profit-value { font-size: 15.5px; }
    .content { padding-left: 12px; padding-right: 12px; }
    .balance-card { padding: 10px 11px; }
    .balance-card-value { font-size: 15.5px; }
    .action-bar-add, .action-bar-close { font-size: 13.5px; padding-left: 10px; padding-right: 10px; }
  }
</style>
</head>
<body>
<div id="shell"></div>

<script>
/* ===============================================================
   Firebase Config
   =============================================================== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC6X9s2vAb4XIFUKEuTxPCjyo6iXuOnkTg",
  authDomain: "cash-app-9745c.firebaseapp.com",
  projectId: "cash-app-9745c",
  storageBucket: "cash-app-9745c.firebasestorage.app",
  messagingSenderId: "767255009973",
  appId: "1:767255009973:web:e6b260ecaa64553a56fcfc"
};
let db = null;

function waitForFirebaseSDK(timeoutMs) {
  timeoutMs = timeoutMs || 20000;
  return new Promise((resolve, reject) => {
    const start = Date.now();
    (function poll() {
      if (typeof firebase !== "undefined" && firebase.apps) { resolve(); return; }
      if (Date.now() - start > timeoutMs) { reject(new Error("firebase-sdk-timeout")); return; }
      setTimeout(poll, 100);
    })();
  });
}

function reportSaveError(msg) {
  console.error(msg);
  state.saveError = msg;
  render();
}

/* ---- Firestore helpers ---- */
function saveMachines(machines) {
  if (!db) return;
  db.collection("meta").doc("machines").set({ list: machines })
    .catch(err => reportSaveError("فشل حفظ بيانات المكن: " + (err.message || err.code)));
}
function saveWalletNames(names) {
  if (!db) return;
  db.collection("meta").doc("walletNames").set(names)
    .catch(err => reportSaveError("فشل حفظ أسماء المحافظ: " + (err.message || err.code)));
}
function saveWalletLimits(limits) {
  if (!db) return;
  db.collection("meta").doc("walletLimits").set(limits)
    .catch(err => reportSaveError("فشل حفظ حدود المحافظ (الليميت): " + (err.message || err.code)));
}
/* ✦ NEW: حفظ حسابات انستاباي */
function saveInstapayAccounts(accounts) {
  if (!db) return;
  db.collection("meta").doc("instapayAccounts").set({ list: accounts })
    .catch(err => reportSaveError("فشل حفظ حسابات انستاباي: " + (err.message || err.code)));
}
/* ✦ NEW: حفظ عمولات المحافظ */

/* ===============================================================

const AR_MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const AR_DAYS = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function pad(n){ return String(n).padStart(2,"0"); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function displayDate(key){
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${AR_DAYS[dt.getDay()]} ${d} ${AR_MONTHS[m-1]} ${y}`;
}
function timeNow(){
  const d = new Date();
  let h = d.getHours(); const m = pad(d.getMinutes());
  const ampm = h >= 12 ? "م" : "ص";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m} ${ampm}`;
}
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function money(n){
  const v = Number(n)||0;
  return v.toLocaleString("en-US", { minimumFractionDigits: v % 1 !== 0 ? 2 : 0, maximumFractionDigits: 2 });
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  { id: "ip1", name: "انستاباي 1" }

/* ✦ UPDATED: computeLive يدعم حسابات انستاباي المتعددة + عمولة المحفظة */
function computeLive(dayData){
  const o = dayData.opening || emptyOpening();
  let drawer = o.drawer;
  let machineDrawer = o.machineDrawer || 0;
  // دعم الحساب القديم (instapay رقم) والجديد (instapayAccounts كائن)
  let instapay = o.instapay || 0; // legacy single
  const instapayAccounts = {};
  // ابدأ من الأرصدة الافتتاحية
  (state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS).forEach(acc => {
    instapayAccounts[acc.id] = num(o.instapayAccounts?.[acc.id] ?? 0);
  });
  let islamBalance = o.islamBalance || 0;
  const wallets = { ...o.wallets };
  const machines = { ...(o.machines || {}) };

  (dayData.transactions || []).forEach(t => {
    const amt = num(t.amount);
    const p = num(t.profit);
    const comm = num(t.commission); // ✦ NEW: عمولة المحفظة

    if (t.category === "vodafone") {
      if (t.subtype === "سحب") {
        drawer += (-amt + p);
        wallets[t.walletId] = (wallets[t.walletId]||0) + amt;
        // ✦ عمولة المحفظة: تتخصم من المحفظة
        if (comm > 0) wallets[t.walletId] = (wallets[t.walletId]||0) - comm;
      }
      if (t.subtype === "إيداع") {
        drawer += (amt + p);
        wallets[t.walletId] = (wallets[t.walletId]||0) - amt;
        // ✦ عمولة المحفظة: تتخصم من المحفظة
        if (comm > 0) wallets[t.walletId] = (wallets[t.walletId]||0) - comm;
      }
    } else if (t.category === "instapay") {
      const accId = t.instapayAccountId || "ip1";
      if (t.subtype === "سحب") {
        drawer += (-amt + p);
        instapayAccounts[accId] = (instapayAccounts[accId] || 0) + amt;
        instapay += amt; // legacy compat
      }
      if (t.subtype === "إيداع") {
        drawer += (amt + p);
        instapayAccounts[accId] = (instapayAccounts[accId] || 0) - amt;
        instapay -= amt; // legacy compat
      }
    } else if (t.category === "islam") {
      if (t.subtype === "سحب") { drawer += (-amt + p); islamBalance += amt; }
      if (t.subtype === "إيداع") { drawer += (amt + p); islamBalance -= amt; }
    } else if (t.category === "machine") {
      const sub = t.machineSub;
      if (sub === "فيزا") {
        drawer += (-amt + p);
        const cur = machines[t.machineId];
        const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
        obj["فيزا"] = (obj["فيزا"] || 0) + amt;
        machines[t.machineId] = obj;
      } else if (sub) {
        machineDrawer += (amt + p);
        const cur = machines[t.machineId];
        const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
        obj[sub] = (obj[sub] || 0) - amt;
        machines[t.machineId] = obj;
      } else {
        machineDrawer += (amt + p);
        machines[t.machineId] = (machines[t.machineId] || 0) - amt;
      }
    } else if (t.category === "expense") {
      drawer -= amt;
    } else if (t.category === "cash") {
      drawer += amt;
    }
  });
  return { drawer, machineDrawer, wallets, instapay, instapayAccounts, machines, islamBalance };
}

const LISTENER_RETRY_DELAYS = [1000, 2000, 4000, 8000, 15000];

function attachRealtimeListeners() {
  if (state.listenersAttached) return;
  state.listenersAttached = true;
  state.unsubscribers = [];
  attachMachinesListener(0);
  attachWalletNamesListener(0);
  attachWalletLimitsListener(0);
  attachInstapayAccountsListener(0);   // ✦ NEW
  attachWalletCommissionsListener(0);  // ✦ NEW
  attachDayListener(0);
}

function scheduleRetry(retryCount, fn) {
  if (!state.authUser) return;
  const delay = LISTENER_RETRY_DELAYS[Math.min(retryCount, LISTENER_RETRY_DELAYS.length - 1)];
  setTimeout(() => { if (state.authUser) fn(); }, delay);
}

function attachMachinesListener(retryCount) {
  const unsub = db.collection("meta").doc("machines").onSnapshot(snap => {
    const data = snap.exists ? snap.data() : null;
    if (data && Array.isArray(data.list) && data.list.length > 0) {
      state.machines = data.list;
    } else if (!state.machinesReady) {
      const DEFAULT_MACHINES = ["فوري", "اوبي", "أمان", "ممكن", "سوبر باي", "باب رزق"];
      const seeded = DEFAULT_MACHINES.map(name => ({ id: genId(), name }));
      state.machines = seeded;
      saveMachines(seeded);
    }
    state.machinesReady = true;
    checkReady();
    render();
  }, err => {
    console.error("machines listener error (retry " + retryCount + ")", err);
    scheduleRetry(retryCount, () => attachMachinesListener(retryCount + 1));
  });
  state.unsubscribers.push(unsub);
}

   =============================================================== */
const LOGIN_EMAIL_DOMAIN = "@cash.app";
const BOOT_RETRY_DELAYS = [1000, 2000, 4000, 8000];

async function bootApp(retryCount) {
  retryCount = retryCount || 0;
  render();
  try {
    await waitForFirebaseSDK();
    if (!state.fbReady) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      db.settings({ ignoreUndefinedProperties: true });
      try { await db.enablePersistence({ synchronizeTabs: true }); } catch (e) { console.warn("offline persistence not enabled", e.code || e.message); }
      state.fbReady = true;
      firebase.auth().onAuthStateChanged(user => {
        state.authUser = user;
        state.authChecked = true;
        state.loginSubmitting = false;
        if (user) { attachRealtimeListeners(); loadUserProfile(user); }
        else { state.userProfile = null; state.userProfileReady = false; }
        render();
      });
    }
    state.connectionError = null;
    render();
  } catch (e) {
    console.error("boot failed (attempt " + retryCount + ")", e);
    if (retryCount < BOOT_RETRY_DELAYS.length) setTimeout(() => bootApp(retryCount + 1), BOOT_RETRY_DELAYS[retryCount]);
    else showConnectionError();
  }
}

function attemptLogin() {
  const uEl = document.getElementById("login-username");
  const pEl = document.getElementById("login-password");
  const username = (uEl?.value || "").trim().toLowerCase();
  const password = pEl?.value || "";
  if (!username || !password) { state.loginError = "اكتب اسم المستخدم وكلمة المرور"; render(); return; }
  state.loginError = null;
  state.loginSubmitting = true;
  render();
  const email = username + LOGIN_EMAIL_DOMAIN;
  firebase.auth().signInWithEmailAndPassword(email, password)
    .catch(err => {
      state.loginSubmitting = false;
      const map = {
        "auth/operation-not-allowed": `طريقة الدخول (Email/Password) مش مفعّلة في Firebase.`,
        "auth/user-not-found": `مفيش حساب مسجّل بالإيميل "${email}".`,
        "auth/wrong-password": "كلمة المرور غلط.",
        "auth/invalid-credential": `اسم المستخدم أو كلمة المرور مش متطابقين.`,
        "auth/invalid-email": "اسم المستخدم فيه رمز مش مسموح.",
        "auth/user-disabled": "الحساب ده متوقف من Firebase Console.",
        "auth/too-many-requests": "محاولات غلط كتير، استنى شوية وجرب تاني.",
        "auth/network-request-failed": "مفيش اتصال بالإنترنت.",
      };
      state.loginError = map[err.code] || `خطأ (${err.code || "غير معروف"}): ${err.message || ""}`;
      render();
    });
}

function loadUserProfile(user) {
  if (!db) return;
  db.collection("users").doc(user.uid).get().then(snap => {
    if (snap.exists) {
      const data = snap.data();
      if (data.disabled) {
        state.userProfile = null; state.userProfileReady = true; render();
        alert("الحساب ده متعطّل من الأدمن.");
        firebase.auth().signOut().then(() => db ? db.terminate() : null).then(() => firebase.firestore().clearPersistence()).catch(err => console.warn("cleanup failed", err)).finally(() => location.reload());
        return;
      }
      state.userProfile = { username: data.username || (user.email||"").split("@")[0], role: data.role || "viewer" };
      state.userProfileReady = true; render(); return;
    }
    db.collection("users").limit(1).get().then(qsnap => {
      const username = (user.email || "").split("@")[0];
      if (qsnap.empty) {
        const profile = { username, role: "admin", disabled: false, createdAt: Date.now() };
        db.collection("users").doc(user.uid).set(profile).catch(err => console.error("seed admin profile failed", err));
        state.userProfile = { username, role: "admin" };
      } else { state.userProfile = { username, role: "viewer" }; }
      state.userProfileReady = true; render();
    }).catch(err => { console.error("loadUserProfile bootstrap check failed", err); state.userProfileReady = true; render(); });
  }).catch(err => { console.error("loadUserProfile failed", err); state.userProfileReady = true; render(); });
}

function canEdit() { return !!state.userProfile && (state.userProfile.role === "admin" || state.userProfile.role === "editor"); }

  try {
    secondaryApp = firebase.initializeApp(FIREBASE_CONFIG, secondaryName);
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;
    await db.collection("users").doc(uid).set({ username, role, disabled: false, createdAt: Date.now(), createdBy: state.userProfile?.username || "" });
    await secondaryApp.auth().signOut();
    await secondaryApp.delete();
    state.addUserBusy = false; state.sheet = null; state.newUserForm = null;
    loadUsersList();
  } catch (err) {
    console.error("create user failed", err);
    if (secondaryApp) { try { await secondaryApp.delete(); } catch(e) {} }
    const map = {
      "auth/email-already-in-use": "اسم المستخدم ده متسجل بالفعل.",
      "auth/weak-password": "كلمة المرور ضعيفة.",
      "auth/invalid-email": "اسم المستخدم فيه رمز مش مسموح.",
      "auth/operation-not-allowed": "إنشاء مستخدمين مش مفعّل في Firebase.",
      "auth/network-request-failed": "مفيش اتصال بالإنترنت.",
    };
    state.addUserError = map[err.code] || `حصل خطأ (${err.code || "غير معروف"}): ${err.message || ""}`;
    state.addUserBusy = false; render();
  }
}
function toggleUserRole(id) {
  if (!isAdmin()) return;
  const u = state.usersList.find(x => x.id === id);
  if (!u || u.role === "admin") { if(u && u.role==="admin") alert("مينفعش تغيّر صلاحية الأدمن."); return; }
  const next = u.role === "editor" ? "viewer" : "editor";
  db.collection("users").doc(u.id).update({ role: next }).then(() => loadUsersList()).catch(err => alert("فشل: " + (err.message||err)));
}
function toggleUserDisabled(id) {
  if (!isAdmin()) return;
  const u = state.usersList.find(x => x.id === id);
  if (!u || u.role === "admin") { if(u && u.role==="admin") alert("مينفعش تعطّل حساب الأدمن."); return; }
  const next = !u.disabled;
  if (!confirm(next ? `تعطيل حساب "${u.username}"؟` : `تفعيل حساب "${u.username}"؟`)) return;
  db.collection("users").doc(u.id).update({ disabled: next }).then(() => loadUsersList()).catch(err => alert("فشل: " + (err.message||err)));
}
function logout() {
  if (!confirm("تسجيل الخروج؟")) return;
  (state.unsubscribers || []).forEach(u => { try { u(); } catch(e) {} });
  state.unsubscribers = []; state.listenersAttached = false; state.ready = false;
  state.machinesReady = false; state.walletNamesReady = false; state.dayReady = false;
  state.instapayAccountsReady = false; state.walletCommissionsReady = false;
  state.connectionError = null; state.userProfile = null; state.userProfileReady = false; state.usersList = [];
  firebase.auth().signOut()
    .then(() => db ? db.terminate() : null)
    .then(() => firebase.firestore().clearPersistence())
    .catch(err => console.warn("logout cleanup failed", err))
    .finally(() => location.reload());
}

/* ===============================================================
   Render dispatch
   =============================================================== */
function render() {
  const root = document.getElementById("shell");
  if (state.connectionError) {
    root.innerHTML = `
      <div class="loading-wrap">
        ${icon("alert-triangle", {size:32, color:"var(--rust)"})}
        <div class="loading-text" style="color:var(--rust); text-align:center; padding:0 24px;">${esc(state.connectionError)}</div>
        <button class="primary-btn" style="width:auto; padding:11px 22px;" onclick="location.reload()">إعادة المحاولة</button>
      </div>`;
    return;
  }
  if (!state.fbReady || !state.authChecked) {
    root.innerHTML = `<div class="loading-wrap"><div class="spin">${icon("loader-2", {size:32, color:"var(--ink-40)"})}</div><div class="loading-text">جاري الاتصال...</div></div>`;
    return;
  }
  if (!state.authUser) { root.innerHTML = renderLoginScreen(); return; }
  if (!state.ready) {
    root.innerHTML = `<div class="loading-wrap"><div class="spin">${icon("loader-2", {size:32, color:"var(--ink-40)"})}</div><div class="loading-text">جاري تحميل بيانات المحل...</div></div>`;
    return;
  }

  const live = computeLive(state.dayData);
  const profitTotal = (state.dayData.transactions||[]).reduce((a,t)=>a+num(t.profit),0);

  let bodyHtml = "";
  if (state.tab === "today") bodyHtml = renderTodayView(live);
  else if (state.tab === "archive" && !state.viewDate) bodyHtml = renderArchiveView();
  else if (state.tab === "archive" && state.viewDate) bodyHtml = renderArchiveDetail();
  else if (state.tab === "services") bodyHtml = renderServicesView();

  root.innerHTML = `
    ${renderHeader(state.dayData.status !== "not_started" ? profitTotal : null)}
    ${state.saveError ? `
      <div style="position:sticky; top:0; z-index:40; background:var(--rust); color:#fff; padding:10px 16px; font-size:12.5px; display:flex; align-items:center; gap:8px;">
        ${icon("alert-triangle",{size:15,color:"#fff"})}
        <span style="flex:1;">${esc(state.saveError)}</span>
        <button class="icon-btn" onclick="state.saveError=null; render();">${icon("x",{size:14,color:"#fff"})}</button>
      </div>` : ""}
    <div class="content">${bodyHtml}</div>
    ${renderTabBar()}
    ${state.sheet ? renderSheet() : ""}
  `;
  refreshIcons();
  attachTodayEvents();
}

function renderTabBar() {
  const items = [
    { key: "today", label: "اليوم", i: "store", dot: state.dayData.status === "open" },
    { key: "archive", label: "الأرشيف", i: "archive" },
    { key: "services", label: "الخدمات", i: "settings" },
  ];
  return `
    <div class="tab-bar-wrap">
      <div class="tab-bar">
        ${items.map(it => `
          <button class="tab-btn ${state.tab===it.key?'active':''}" onclick="setTab('${it.key}')">

            <span class="tab-btn-label">${it.label}</span>
            ${it.dot ? '<span class="tab-btn-dot"></span>' : ''}
          </button>
        `).join("")}
      </div>
    </div>
  `;
}

function setTab(t) {
  state.tab = t;
  state.viewDate = null;
  if (t === "archive") {
    state.archiveLoading = true; state.archiveError = null; render();
    fetchArchiveList().then(list => { state.archiveIndex = list; state.archiveLoading = false; render(); })
      .catch(err => { state.archiveError = `تعذر تحميل الأرشيف: ${err.code || ""} ${err.message || err}`; state.archiveLoading = false; render(); });
    return;
  }
  if (t === "services" && isAdmin()) { loadUsersList(); return; }
  render();
}

function renderInstapayWideCard(live, accounts) {
  const subsHtml = accounts.map(acc => {
    const val = num(live.instapayAccounts?.[acc.id] ?? 0);
    const display = state.balancesHidden ? "••••" : money(val);
    return `
      <div class="instapay-sub-card">
        <div class="instapay-sub-label">${esc(acc.name)}</div>

      </div>
    `;
  }).join("");
  return `
    <div class="instapay-wide-card" style="flex:1;">
      <div class="instapay-wide-title">${icon("smartphone",{size:14,color:"var(--ink-60)"})} حسابات انستاباي</div>
      <div class="instapay-subs">${subsHtml}</div>
    </div>
  `;
}

function balanceCard(iconName, label, value, walletId) {
  const neg = value < 0;
  const display = state.balancesHidden ? "••••" : money(value);
  let limitHtml = "";
  if (walletId) {
    const used = num(state.walletLimits[walletId]);
    const remaining = WALLET_LIMIT_TOTAL - used;
    const remColor = remaining < 0 ? "var(--rust)" : "var(--ink-40)";
    const remDisplay = state.balancesHidden ? "••••" : money(remaining);
    limitHtml = `<div class="balance-card-limit num" style="color:${remColor};">متبقي ${remDisplay} من الليميت</div>`;
    /* ✦ NEW: عمولة المحفظة */
    const comm = num(state.walletCommissions?.[walletId]);
    if (comm > 0) {
      limitHtml += `<div class="balance-card-limit" style="color:var(--gold);">عمولة: <span class="num">${money(comm)}</span> ج.م</div>`;
    }
  }
  return `
    <div class="balance-card">
      <div class="balance-card-top">
        ${icon(iconName, {size:13, color:"var(--ink-40)"})}
        <div class="balance-card-label">${esc(label)}</div>
      </div>
      <div class="balance-card-value num ${(neg && !state.balancesHidden)?'negative':''}">${display}</div>
      ${limitHtml}
    </div>
  `;
}

function fawryCard(m, live) {
  return `
    <div class="fawry-card">
      <div class="fawry-card-title">${icon("landmark",{size:14,color:"var(--ink-60)"})}${esc(m.name)}</div>
      <div class="fawry-card-subs">
        ${FAWRY_SUBS.map(s => {
          const val = machineBalValue(live.machines[m.id], s);
          const display = state.balancesHidden ? "••••" : money(val);
          return `
            <div class="fawry-sub">
              <div class="fawry-sub-label">${s}</div>
              <div class="fawry-sub-value num ${(val<0 && !state.balancesHidden)?'negative':''}">${display}</div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function islamCard(value) {
  const v = Number(value) || 0;
  const weOwe = v < 0;
  const abs = Math.abs(v);
  let statusLabel, color;
  if (Math.abs(v) < 0.01) { statusLabel = "متسوّى"; color = "var(--ink-60)"; }
  else if (weOwe) { statusLabel = "لإسلام عندنا"; color = "var(--rust)"; }
  else { statusLabel = "لينا عند إسلام"; color = "var(--emerald)"; }
  const display = state.balancesHidden ? "••••" : money(abs);
  return `
    <div class="balance-card" style="width:100%;">
      <div class="balance-card-top">${icon("user", {size:13, color:"var(--ink-40)"})}<div class="balance-card-label">حساب إسلام</div></div>
      <div style="display:flex; align-items:baseline; gap:8px;">
        <div class="balance-card-value num" style="color:${color};">${display}</div>
        <div style="font-size:12px; font-weight:700; color:${color};">${statusLabel}</div>
      </div>
    </div>
  `;
}

function renderTodayView(live) {

function renderTxRow(tx, editable) {
  let iconName, color, title;
  if (tx.category === "vodafone") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    title = `فودافون كاش · ${tx.subtype} · ${esc(state.walletNames[tx.walletId] || tx.walletId)}`;
  } else if (tx.category === "instapay") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    /* ✦ اعرض اسم الحساب */
    const accName = getInstapayAccountName(tx.instapayAccountId);
    title = `انستاباي · ${tx.subtype} · ${esc(accName)}`;
  } else if (tx.category === "islam") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    title = `حساب إسلام · ${tx.subtype}`;
  } else if (tx.category === "expense") {
    iconName = "log-out"; color = "var(--rust)";
    title = `خوارج · ${esc(tx.destination || "—")}`;
  } else if (tx.category === "cash") {
    iconName = "banknote"; color = "var(--emerald)";
    title = `نقدية · ${esc(tx.destination || "—")}`;
  } else {
    const m = state.machines.find(m=>m.id===tx.machineId);
    if (tx.machineSub === "فيزا") { iconName = "arrow-up-circle"; color = "var(--steel)"; }
    else { iconName = "zap"; color = "var(--gold)"; }
    title = `شحن مكن · ${esc(m ? m.name : "—")}${tx.machineSub ? " · " + esc(tx.machineSub) : ""}`;
  }
  const comm = num(tx.commission);
  return `
    <div class="tx-row">
      <div class="tx-row-icon" style="background: ${tint15(color)};">
        ${icon(iconName, {size:16, color})}
      </div>
      <div class="tx-row-body">
        <div class="tx-row-title">${title}</div>
        <div class="tx-row-sub">${tx.time}${tx.createdBy ? ` · ${esc(tx.createdBy)}` : ""}${tx.note ? ` · ${esc(tx.note)}` : ""}</div>
      </div>
      <div class="tx-row-amt">
        <div class="tx-row-amt-val num">${money(tx.amount)}</div>
        ${num(tx.profit) > 0 ? `<div class="tx-row-profit num">+${money(tx.profit)} مكسب</div>` : ""}
        ${comm > 0 ? `<div class="tx-row-commission num">-${money(comm)} عمولة</div>` : ""}
      </div>
      ${editable ? `
        <div class="tx-row-actions">
          <button class="icon-btn" onclick="openTxSheet('${tx.id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>
          <button class="icon-btn" onclick="confirmDeleteTx('${tx.id}')">${icon("trash-2",{size:14,color:"var(--rust)"})}</button>
        </div>
      ` : ""}
    </div>
  `;
}

function getInstapayAccountName(id) {
  if (!id) return "انستاباي";
  const acc = (state.instapayAccounts || []).find(a => a.id === id);
  return acc ? acc.name : "انستاباي";
}

function renderClosedStamp(closing, live, closedBy) {
  const ipAccounts = state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS;
  const ipDiffs = ipAccounts.map(acc => num(closing.instapayAccounts?.[acc.id] ?? closing.instapay ?? 0) - num(live.instapayAccounts?.[acc.id] ?? 0));
  const machineDiffs = state.machines.map(m => {
    const subs = machineSubs(m);
    if (subs) return subs.map(s => machineBalValue(closing.machines?.[m.id], s) - machineBalValue(live.machines?.[m.id], s));
    return [machineBalValue(closing.machines?.[m.id]) - machineBalValue(live.machines?.[m.id])];
  }).flat();
  const diffs = [
    num(closing.drawer) - live.drawer,
    num(closing.machineDrawer) - live.machineDrawer,
    ...WALLET_IDS.map(id => num(closing.wallets?.[id]) - live.wallets[id]),
    ...ipDiffs,
    ...machineDiffs,
    num(closing.islamBalance) - live.islamBalance,
  ];
  const matched = diffs.every(d => Math.abs(d) < 0.01);
  const totalDiff = diffs.reduce((a,b)=>a+b, 0);
  const c = matched ? "var(--emerald)" : "var(--rust)";
  return `
    <div class="closed-stamp" style="border:2px dashed ${c};">
      <div class="closed-stamp-badge" style="border:2px solid ${c}; color:${c};">
        ${icon(matched ? "check-circle-2" : "alert-triangle", {size:17})}
        ${matched ? "مطابق" : "فيه فرق"}
      </div>
      <div class="closed-stamp-sub">اليوم مقفول${closedBy ? ` · بواسطة ${esc(closedBy)}` : ""}</div>
      ${!matched ? `<div class="closed-stamp-diff">إجمالي الفرق: <span class="num" style="font-weight:700;color:var(--rust);">${money(totalDiff)}</span> ج.م</div>` : ""}
    </div>
  `;
}

async function downloadDayPDF(dayKey, dayData) {
  if (!dayData) return;
  if (typeof html2canvas === "undefined" || !window.jspdf) {
    alert("تعذر تحميل أدوات إنشاء الـ PDF. تأكد من اتصالك بالإنترنت وحاول تاني.");
    return;
  }
  const btn = document.getElementById("pdf-download-btn");
  const btnOriginal = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = `${icon("loader-2",{size:16,color:"currentColor",style:"animation:spin 1s linear infinite;"})} جاري التجهيز...`; }
  try {
    const live = computeLive(dayData);
    const profitTotal = (dayData.transactions || []).reduce((a,t)=>a+num(t.profit), 0);
    const txs = [...(dayData.transactions || [])].reverse();
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:fixed; top:0; left:-99999px; width:760px; background:#ffffff; padding:28px; font-family:'Tajawal',sans-serif; direction:rtl; color:#17262b;";
    wrap.innerHTML = `
      <div style="font-family:'Cairo',sans-serif; font-weight:800; font-size:20px; margin-bottom:4px;">دفتر المحل — تقرير يوم</div>
      <div style="font-size:13px; color:#5a6b70; margin-bottom:18px;">${displayDate(dayKey)}${dayData.closedAt ? " · اتقفل الساعة " + dayData.closedAt : ""}</div>
      <div style="font-size:14.5px; font-weight:700; margin-bottom:16px;">مكسب اليوم: <span class="num">${money(profitTotal)}</span> ج.م</div>
      ${dayData.status === "closed" && dayData.closing ? renderClosedStamp(dayData.closing, live, dayData.closedBy) : ""}
      ${renderBalancesGrid(live)}
      <div class="section-title">المعاملات (${txs.length})</div>
      <div class="tx-list-box ${txs.length ? '' : 'empty'}">
        ${txs.length === 0 ? '<div class="tx-list-empty">لا توجد معاملات</div>' : txs.map(t => renderTxRow(t, false)).join("")}
      </div>
    `;
    document.body.appendChild(wrap);
    const canvas = await html2canvas(wrap, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
    document.body.removeChild(wrap);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pageWidth = 210, pageHeight = 297;
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    const imgData = canvas.toDataURL("image/png");
    let heightLeft = imgHeight, position = 0;
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while (heightLeft > 0) {
      position = heightLeft - imgHeight; pdf.addPage();
      pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    pdf.save(`تقرير-${dayKey}.pdf`);
  } catch (e) {
    console.error(e); alert("حصل خطأ أثناء إنشاء الـ PDF.");
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = btnOriginal; }
  }
}

function vodafoneDepositContribution(t) {
  if (t && t.category === "vodafone" && t.subtype === "إيداع" && t.walletId) {
    return { walletId: t.walletId, amount: num(t.amount) };
  }
  return null;
}
function applyLimitDelta(oldTx, newTx) {
  const oldC = vodafoneDepositContribution(oldTx);
  const newC = vodafoneDepositContribution(newTx);
  if (!oldC && !newC) return;
  const limits = { ...state.walletLimits };
  if (oldC) limits[oldC.walletId] = num(limits[oldC.walletId]) - oldC.amount;
  if (newC) limits[newC.walletId] = num(limits[newC.walletId]) + newC.amount;
  state.walletLimits = limits;
  saveWalletLimits(limits);
}

function validateMachineBalances(newTxs) {
  const live = computeLive({ ...state.dayData, transactions: newTxs });
  for (const m of state.machines) {
    const subs = machineSubs(m);
    if (subs) {
      for (const s of subs) {
        if (s === FAWRY_NO_NEGATIVE_EXEMPT) continue;
        const val = machineBalValue(live.machines[m.id], s);
        if (val < -0.005) return false;
      }
    } else {
      const val = machineBalValue(live.machines[m.id]);
      if (val < -0.005) return false;
    }
  }
  return true;
}

function submitTx() {
  if (!requireEdit()) return;
  syncTxFormFromInputs();
  const f = state.txForm;
  const destTrimmed = (f.destination || "").trim();
  if (!(num(f.amount) > 0)) { alert("من فضلك اكتب مبلغ صحيح أكبر من صفر."); return; }
  if (f.category === "machine" && !f.machineId) { alert("لازم تضيف مكينة شحن الأول."); return; }
  const selMachine = f.category === "machine" ? state.machines.find(m => m.id === f.machineId) : null;
  const selSubs = selMachine ? machineSubs(selMachine) : null;
  if (selSubs && !f.machineSub) { alert("اختار البند (مدفوعات / خدمات موبايل / فيزا) الأول."); return; }
  if (f.category === "expense" && !destTrimmed) { alert("اكتب اسم الجهة أو الشخص."); return; }
  if (f.category === "cash" && !destTrimmed) { alert("اكتب اسم المودع."); return; }

  const oldTx = f.id ? state.dayData.transactions.find(t => t.id === f.id) : null;
  const currentUsername = state.userProfile?.username || (state.authUser?.email || "").split("@")[0] || "";

  const tx = {
    id: f.id, time: f.time, category: f.category,
    subtype: f.category === "machine" ? "شحن" : (f.category === "expense" ? "خوارج" : (f.category === "cash" ? "نقدية" : f.subtype)),
    walletId: f.category === "vodafone" ? f.walletId : undefined,
    machineId: f.category === "machine" ? f.machineId : undefined,
    machineSub: (f.category === "machine" && selSubs) ? f.machineSub : undefined,
    instapayAccountId: f.category === "instapay" ? (f.instapayAccountId || (state.instapayAccounts||[])[0]?.id) : undefined, // ✦ NEW
    destination: (f.category === "expense" || f.category === "cash") ? destTrimmed : undefined,
    amount: num(f.amount),
    profit: (f.category === "expense" || f.category === "cash") ? 0 : (num(f.profit) || 0),
    commission: f.category === "vodafone" ? (num(f.commission) || 0) : 0,  // ✦ NEW
    note: (f.note||"").trim(),
    createdBy: oldTx?.createdBy || currentUsername,
    editedBy: oldTx ? currentUsername : undefined,
  };
  Object.keys(tx).forEach(k => { if (tx[k] === undefined) delete tx[k]; });

  let txs;
  if (tx.id) txs = state.dayData.transactions.map(t => t.id === tx.id ? { ...tx } : t);
  else txs = [...state.dayData.transactions, { ...tx, id: genId(), time: timeNow() }];

  if (tx.category === "machine" && !validateMachineBalances(txs)) {
    alert("لا يمكن تنفيذ المعاملة حيث انها أكبر من الرصيد المتاح.");
    return;
  }
  state.dayData = { ...state.dayData, transactions: txs };
  try { persistDay(state.today, state.dayData); }
  catch (err) { console.error("submitTx save failed", err); alert("حصل خطأ أثناء حفظ المعاملة: " + (err.message || err)); return; }
  applyLimitDelta(oldTx, tx);
  state.sheet = null; state.txForm = null;
  render();
}

function closeRowInputChanged(kind, id, sub) {
  const live = computeLive(state.dayData);
  let expected, inputId, diffId;
  if (kind === "drawer") { expected = live.drawer; inputId = "cd-drawer"; diffId = "cd-diff-drawer"; }
  else if (kind === "machineDrawer") { expected = live.machineDrawer; inputId = "cd-machineDrawer"; diffId = "cd-diff-machineDrawer"; }
  else if (kind === "wallet") { expected = live.wallets[id]; inputId = `cd-wallet-${id}`; diffId = `cd-diff-wallet-${id}`; }
  else if (kind === "instapayAcc") { expected = num(live.instapayAccounts?.[id] ?? 0); inputId = `cd-instapay-${id}`; diffId = `cd-diff-instapay-${id}`; }
  else if (kind === "machine") { expected = num(live.machines?.[id]); inputId = `cd-machine-${id}`; diffId = `cd-diff-machine-${id}`; }
  else if (kind === "machineSub") { expected = machineBalValue(live.machines?.[id], sub); inputId = `cd-machine-${id}-${sub}`; diffId = `cd-diff-machine-${id}-${sub}`; }
  else if (kind === "islam") { expected = live.islamBalance; inputId = "cd-islam"; diffId = "cd-diff-islam"; }
  const el = document.getElementById(inputId);
  const diffEl = document.getElementById(diffId);
  if (!el || !diffEl) return;
  const val = el.value;
  if (val === "") { diffEl.innerHTML = ""; return; }
  const diff = num(val) - expected;
  const ok = Math.abs(diff) < 0.01;
  diffEl.innerHTML = `الفرق: <span class="num" style="font-weight:700;">${money(diff)}</span>`;
  diffEl.style.color = ok ? "var(--emerald)" : "var(--rust)";
}

function renderCloseSheetBody() {
  const live = computeLive(state.dayData);
  const ipAccounts = state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS;
  const row = (label, expected, inputId, diffId, onchange) => `
    <div class="close-row">
      <div class="close-row-top">
        <span class="close-row-label">${esc(label)}</span>
        <span class="close-row-expected">المتوقع: <span class="num" style="font-weight:700;color:var(--ink);">${money(expected)}</span></span>
      </div>
      <input type="number" inputmode="decimal" class="input" placeholder="الجرد الفعلي" id="${inputId}" oninput="${onchange}">
      <div id="${diffId}" style="margin-top:6px;font-size:12.5px;"></div>
    </div>
  `;
  const txs = [...(state.dayData.transactions || [])].reverse();
  let html = `
    <div class="tx-list-header">
      <div class="tx-list-title">معاملات اليوم (${txs.length})</div>
      <button id="pdf-download-btn" style="display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:10px; border:1.5px solid var(--ink-15); background:#fff; font-size:12.5px; font-weight:700; color:var(--ink);" onclick="downloadDayPDF(state.today, state.dayData)">
        ${icon("download",{size:14})} تحميل PDF
      </button>
    </div>
    <div class="tx-list-box ${txs.length ? '' : 'empty'}" style="margin-bottom:18px;">
      ${txs.length === 0 ? `<div class="tx-list-empty">لا توجد معاملات</div>` : txs.map(t => renderTxRow(t, false)).join("")}
    </div>
    <div class="close-intro">اكتب اللي معاك فعليًا وهنقارنه بالمتوقع تلقائيًا</div>
  `;
  html += row("الدرج (كاش)", live.drawer, "cd-drawer", "cd-diff-drawer", "closeRowInputChanged('drawer')");
  html += row("الدرج (مكن)", live.machineDrawer, "cd-machineDrawer", "cd-diff-machineDrawer", "closeRowInputChanged('machineDrawer')");
  WALLET_IDS.forEach(id => {
    html += row(state.walletNames[id], live.wallets[id], `cd-wallet-${id}`, `cd-diff-wallet-${id}`, `closeRowInputChanged('wallet','${id}')`);
  });
  /* ✦ NEW: جرد كل حساب انستاباي على حدة */
  ipAccounts.forEach(acc => {
    const bal = num(live.instapayAccounts?.[acc.id] ?? 0);
    html += row(acc.name, bal, `cd-instapay-${acc.id}`, `cd-diff-instapay-${acc.id}`, `closeRowInputChanged('instapayAcc','${acc.id}')`);
  });
  state.machines.forEach(m => {
    const subs = machineSubs(m);
    if (subs) {
      subs.forEach(s => {
        html += row(`${m.name} - ${s}`, machineBalValue(live.machines?.[m.id], s), `cd-machine-${m.id}-${s}`, `cd-diff-machine-${m.id}-${s}`, `closeRowInputChanged('machineSub','${m.id}','${s}')`);
      });
    } else {
      html += row(m.name, num(live.machines?.[m.id]), `cd-machine-${m.id}`, `cd-diff-machine-${m.id}`, `closeRowInputChanged('machine','${m.id}')`);
    }
  });
  html += row("حساب إسلام", live.islamBalance, "cd-islam", "cd-diff-islam", "closeRowInputChanged('islam')");
  return html;
}

function submitCloseDay() {
  if (!requireEdit()) return;
  const ipAccounts = state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS;
  const instapayAccountsData = {};
  ipAccounts.forEach(acc => {
    const el = document.getElementById(`cd-instapay-${acc.id}`);
    instapayAccountsData[acc.id] = el ? num(el.value) : 0;
  });
  const closing = {
    drawer: num(document.getElementById("cd-drawer").value),
    machineDrawer: num(document.getElementById("cd-machineDrawer").value),
    wallets: Object.fromEntries(WALLET_IDS.map(id => [id, num(document.getElementById(`cd-wallet-${id}`).value)])),
    instapay: 0,
    instapayAccounts: instapayAccountsData,
    machines: Object.fromEntries(state.machines.map(m => {
      const subs = machineSubs(m);
      if (subs) {
        const obj = {};
        subs.forEach(s => { const el = document.getElementById(`cd-machine-${m.id}-${s}`); obj[s] = el ? num(el.value) : 0; });
        return [m.id, obj];
      }
      const el = document.getElementById(`cd-machine-${m.id}`);
      return [m.id, el ? num(el.value) : 0];
    })),
    islamBalance: num(document.getElementById("cd-islam").value),
  };
  state.dayData = { ...state.dayData, status: "closed", closing, closedAt: timeNow(), closedBy: state.userProfile?.username || "" };
  persistDay(state.today, state.dayData);
  state.sheet = null;
  render();
}

/* ===============================================================
   Sheet dispatcher
   =============================================================== */
function closeSheet() { state.sheet = null; state.txForm = null; render(); }

function renderSheet() {
  let title, body, footer;
  if (state.sheet === "start") {
    title = "الأرصدة الافتتاحية"; body = renderStartSheet();
    footer = `<button class="primary-btn" onclick="submitStartDay()">بدء اليوم</button>`;
  } else if (state.sheet === "tx") {
    const editing = !!state.txForm.id;
    title = editing ? "تعديل المعاملة" : "معاملة جديدة"; body = renderTxSheetBody();
    footer = `<button class="primary-btn" onclick="submitTx()">${editing ? "حفظ التعديل" : "إضافة المعاملة"}</button>`;
  } else if (state.sheet === "close") {
    title = "إغلاق اليوم وجرد الدرج"; body = renderCloseSheetBody();
    footer = `<button class="primary-btn" onclick="submitCloseDay()">تأكيد الإغلاق</button>`;
  } else if (state.sheet === "addMachine") {
    title = "إضافة مكينة شحن"; body = renderAddMachineSheetBody();
    footer = `<button class="primary-btn" id="am-submit-btn" onclick="submitAddMachine()" disabled>إضافة</button>`;
  } else if (state.sheet === "addInstapay") {  // ✦ NEW
    title = "إضافة حساب انستاباي"; body = renderAddInstapaySheetBody();
    footer = `<button class="primary-btn" id="ai-submit-btn" onclick="submitAddInstapay()" disabled>إضافة</button>`;
  } else if (state.sheet === "editOpening") {
    title = "تعديل الأرصدة الافتتاحية"; body = renderEditOpeningSheet();
    footer = `<button class="primary-btn" onclick="submitEditOpening()">حفظ التعديل</button>`;
  } else if (state.sheet === "addUser") {
    title = "إضافة مستخدم جديد"; body = renderAddUserSheetBody();
    const valid = state.newUserForm && (state.newUserForm.username||"").trim() && (state.newUserForm.password||"").length >= 6;
    footer = `<button class="primary-btn" id="au-submit-btn" onclick="submitAddUser()" ${valid ? "" : "disabled"}>${state.addUserBusy ? "جاري الإضافة..." : "إضافة المستخدم"}</button>`;
  }

  return `
    <div class="sheet-overlay">
      <div class="sheet-backdrop" onclick="closeSheet()"></div>
      <div class="sheet">
        <div class="sheet-grip-wrap"><div class="sheet-grip"></div></div>
        <div class="sheet-header">
          <h3 class="sheet-title">${title}</h3>
          <button class="sheet-close-btn" onclick="closeSheet()">${icon("x",{size:17,color:"var(--ink)"})}</button>
        </div>
        <div class="sheet-body" id="sheet-body">${body}</div>
        <div class="sheet-footer">${footer}</div>
      </div>
    </div>
  `;
}

function refreshSheetOnly() {
  const bodyEl = document.getElementById("sheet-body");
  if (bodyEl) { bodyEl.innerHTML = renderTxSheetBody(); refreshIcons(); }
}

/* ===============================================================
   Archive
   =============================================================== */
function renderArchiveView() {
  if (state.archiveLoading) return `<div class="archive-title">الأرشيف</div><div class="archive-empty">جاري التحميل...</div>`;
  if (state.archiveError) return `
    <div class="archive-title">الأرشيف</div>
    <div class="warn-box" style="margin-bottom:12px;">${esc(state.archiveError)}</div>
    <button class="primary-btn" style="width:auto; padding:11px 22px;" onclick="setTab('archive')">إعادة المحاولة</button>
  `;
  const past = state.archiveIndex.filter(d => d !== state.today);
  if (past.length === 0) return `<div class="archive-title">الأرشيف</div><div class="archive-empty">مفيش أيام سابقة لسه</div>`;
  return `
    <div class="archive-title">الأرشيف</div>
    <div class="archive-list">
      ${past.map(d => `
        <button class="archive-list-item" onclick="openArchiveDay('${d}')">
          <span class="archive-list-item-date">${displayDate(d)}</span>
          ${icon("chevron-left", {size:16, color:"var(--ink-40)"})}
        </button>
      `).join("")}
    </div>
  `;
}

function openArchiveDay(d) {
  state.viewDate = d; state.archiveDayData = null; state.archiveDetailError = null; render();
  fetchArchiveDay(d).then(data => { state.archiveDayData = data || emptyDay(); render(); })
    .catch(err => { state.archiveDetailError = `تعذر تحميل بيانات اليوم: ${err.code || ""} ${err.message || err}`; render(); });
}

function renderArchiveDetail() {
  const d = state.archiveDayData;
  if (state.archiveDetailError) return `
    <button class="archive-back-btn" onclick="backToArchiveList()">${icon("chevron-right",{size:16})} رجوع للأرشيف</button>
    <div class="warn-box">${esc(state.archiveDetailError)}</div>
  `;
  if (!d) return `<div style="text-align:center;padding:40px;color:var(--ink-40);">جاري التحميل...</div>`;
  const live = computeLive(d);
  const profitTotal = (d.transactions||[]).reduce((a,t)=>a+num(t.profit),0);
  const txHtml = d.transactions.length === 0
    ? `<div class="tx-list-empty">لا توجد معاملات</div>`
    : [...d.transactions].reverse().map(t => renderTxRow(t, false)).join("");
  return `
    <button class="archive-back-btn" onclick="backToArchiveList()">${icon("chevron-right",{size:16})} رجوع للأرشيف</button>
    <div class="archive-detail-title">${displayDate(state.viewDate)}</div>
    <div class="archive-detail-sub">مكسب اليوم: <span class="num" style="font-weight:700;">${money(profitTotal)}</span> ج.م · ${d.transactions.length} معاملة</div>
    ${d.status === "closed" && d.closing ? renderClosedStamp(d.closing, live, d.closedBy) : ""}
    ${d.status === "closed" ? `
      <button id="pdf-download-btn" class="primary-btn" style="margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="downloadDayPDF(state.viewDate, state.archiveDayData)">
        ${icon("download",{size:16})} تحميل PDF
      </button>
    ` : ""}
    ${renderBalancesGrid(live)}
    <div class="section-title">المعاملات</div>
    <div class="tx-list-box ${d.transactions.length?'':'empty'}">${txHtml}</div>
  `;
}
function backToArchiveList() { state.viewDate = null; state.archiveDayData = null; render(); }

/* ===============================================================
   Services view  ✦ مُحدَّث
   =============================================================== */
function renderServicesView() {
  const editable = canEdit();
  const ipAccounts = state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS;
  let html = `
    <!-- بروفايل المستخدم -->
    <div class="services-list" style="margin-bottom:20px;">
      <div class="services-row">
        ${icon("user",{size:16,color:"var(--ink-60)"})}
        <div style="flex:1;">
          <div class="services-row-name">${esc(state.userProfile?.username || (state.authUser?.email||"").split("@")[0])}</div>
          <div style="font-size:11.5px; color:var(--ink-60); margin-top:2px;">الصلاحية: ${esc(roleLabel(state.userProfile?.role))}</div>
        </div>
      </div>
    </div>

    <!-- إدارة اليوم -->
    <div class="archive-title">إدارة اليوم</div>
    <div class="services-list" style="margin-bottom:20px;">
      ${editable ? `
      <div class="services-row" style="cursor:pointer;" onclick="openEditOpeningSheet()">
        ${icon("pencil",{size:16,color:"var(--ink-60)"})}
        <div class="services-row-name">تعديل الأرصدة الافتتاحية لليوم</div>
        ${icon("chevron-left",{size:15,color:"var(--ink-40)"})}
      </div>
      <div class="services-row" style="cursor:pointer;" onclick="confirmStartNewDay()">
        ${icon("log-out",{size:16,color:"var(--rust)"})}
        <div class="services-row-name" style="color:var(--rust);">بدء يوم جديد (إعادة تعيين)</div>
        ${icon("chevron-left",{size:15,color:"var(--ink-40)"})}
      </div>
      ` : `
      <div class="services-row">
        ${icon("eye",{size:16,color:"var(--ink-40)"})}
        <div class="services-row-name" style="color:var(--ink-40);">حسابك (رؤية فقط) — مفيش صلاحية تعديل</div>
      </div>
      `}
      <div class="services-row" style="cursor:pointer;" onclick="logout()">
        ${icon("log-out",{size:16,color:"var(--ink-60)"})}
        <div class="services-row-name">تسجيل الخروج</div>
        ${icon("chevron-left",{size:15,color:"var(--ink-40)"})}
      </div>
    </div>

    <!-- ✦ حسابات انستاباي -->
    <div class="services-header-row">
      <div class="archive-title" style="margin-bottom:0;">حسابات انستاباي</div>
      ${editable ? `<button class="add-btn" onclick="openAddInstapaySheet()">${icon("plus",{size:15})} إضافة</button>` : ""}
    </div>
    <div class="services-list" style="margin-bottom:20px;">
      ${ipAccounts.length === 0 ? `<div class="services-empty">لسه مفيش حسابات</div>` : ipAccounts.map(acc => `
        <div class="services-row">
          ${icon("smartphone",{size:16,color:"var(--ink-60)"})}
          ${state.editingInstapayId === acc.id ? `
            <input class="services-row-input" id="instapay-edit-input" value="${esc(acc.name)}"
              autofocus onblur="saveInstapayName('${acc.id}')" onkeydown="if(event.key==='Enter'){this.blur();}">
          ` : `<div class="services-row-name">${esc(acc.name)}</div>`}
          ${editable && state.editingInstapayId !== acc.id ? `
            <button class="icon-btn" onclick="startEditInstapay('${acc.id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>
            ${ipAccounts.length > 1 ? `<button class="icon-btn" onclick="confirmDeleteInstapay('${acc.id}', '${esc(acc.name).replace(/'/g,"\\'")}')">${icon("trash-2",{size:14,color:"var(--rust)"})}</button>` : ""}
          ` : ""}
        </div>
      `).join("")}
    </div>

    <!-- المحافظ الإلكترونية -->
    <div class="archive-title">المحافظ الإلكترونية</div>
    <div class="services-list">
      ${WALLET_IDS.map(id => `
        <div class="services-row">
          ${icon("wallet",{size:16,color:"var(--ink-60)"})}
          ${state.editingWalletId === id ? `
            <input class="services-row-input" id="wallet-edit-input" value="${esc(state.walletNames[id])}"
              autofocus onblur="saveWalletName('${id}')" onkeydown="if(event.key==='Enter'){this.blur();}">
          ` : `<div class="services-row-name">${esc(state.walletNames[id])}</div>`}
          ${(editable && state.editingWalletId !== id) ? `
            <button class="icon-btn" onclick="startEditWallet('${id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>
          ` : ""}
        </div>
      `).join("")}
    </div>

    <!-- حدود الإيداع (الليميت) -->
    <div class="archive-title">حدود الإيداع (الليميت) للمحافظ</div>
    <div class="services-list" style="margin-bottom:20px;">
      ${WALLET_IDS.map(id => {
        const used = num(state.walletLimits[id]);
        const remaining = WALLET_LIMIT_TOTAL - used;
        const remColor = remaining < 0 ? "var(--rust)" : "var(--emerald)";
        const editing = state.editingWalletLimitId === id;
        return `
        <div class="services-row" style="align-items:flex-start; flex-wrap:wrap; row-gap:8px;">
          ${icon("landmark",{size:16,color:"var(--ink-60)"})}
          <div style="flex:1; min-width:130px;">
            <div class="services-row-name">${esc(state.walletNames[id])}</div>
            <div style="font-size:11.5px; color:var(--ink-60); margin-top:3px;">
              الليميت: <span class="num" style="font-weight:700;">${money(WALLET_LIMIT_TOTAL)}</span>
              · المتبقي: <span class="num" style="font-weight:700; color:${remColor};">${money(remaining)}</span>
            </div>
          </div>
          ${editing ? `
            <input type="number" inputmode="decimal" class="services-row-input" style="width:110px;"
              placeholder="المستخدم من الليميت" id="wl-limit-input-${id}" value="${used || ''}" autofocus
              onkeydown="if(event.key==='Enter'){saveWalletLimitUsed('${id}');}">
            <button class="chip-btn small" style="flex:none; background:var(--ink); color:var(--paper); border-color:var(--ink);" onclick="saveWalletLimitUsed('${id}')">حفظ</button>
          ` : `
            <div class="num" style="font-weight:700; font-size:13.5px;">${money(used)}</div>
            ${editable ? `<button class="icon-btn" onclick="startEditWalletLimit('${id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>` : ""}
          `}
        </div>
      `;
      }).join("")}
    </div>

    <!-- ✦ NEW: عمولة المحافظ -->
    <div class="archive-title">عمولة المحافظ الافتراضية</div>
    <div class="info-box">العمولة دي بتتضاف تلقائيًا في خانة "عمولة المحفظة" لما تختار المحفظة في المعاملة، وبتتخصم من رصيد المحفظة في السحب والإيداع.</div>
    <div class="services-list" style="margin-bottom:20px;">
      ${WALLET_IDS.map(id => {
        const comm = num(state.walletCommissions?.[id]);
        const editing = state.editingWalletCommissionId === id;
        return `
        <div class="services-row" style="align-items:center; flex-wrap:wrap; row-gap:8px;">
          ${icon("wallet",{size:16,color:"var(--ink-60)"})}
          <div style="flex:1; min-width:130px;">
            <div class="services-row-name">${esc(state.walletNames[id])}</div>
            <div style="font-size:11.5px; color:var(--gold); margin-top:2px; font-weight:600;">
              عمولة افتراضية: <span class="num">${money(comm)}</span> ج.م
            </div>
          </div>
          ${editing ? `
            <input type="number" inputmode="decimal" class="services-row-input" style="width:110px;"
              placeholder="0" id="wc-input-${id}" value="${comm || ''}" autofocus
              onkeydown="if(event.key==='Enter'){saveWalletCommission('${id}');}">
            <button class="chip-btn small" style="flex:none; background:var(--ink); color:var(--paper); border-color:var(--ink);" onclick="saveWalletCommission('${id}')">حفظ</button>
          ` : `
            <div class="num" style="font-weight:700; font-size:13.5px; color:var(--gold);">${money(comm)}</div>
            ${editable ? `<button class="icon-btn" onclick="startEditWalletCommission('${id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>` : ""}
          `}
        </div>
      `;
      }).join("")}
    </div>

    <!-- مكن الشحن -->
    <div class="services-header-row">
      <div class="archive-title" style="margin-bottom:0;">مكن الشحن</div>
      ${editable ? `<button class="add-btn" onclick="openAddMachineSheet()">${icon("plus",{size:15})} إضافة</button>` : ""}
    </div>
    <div class="services-list" style="margin-bottom:20px;">
      ${state.machines.length === 0 ? `<div class="services-empty">لسه مفيش مكن مضافة</div>` : state.machines.map(m => `
        <div class="services-row">
          ${icon("landmark",{size:16,color:"var(--ink-60)"})}
          <div class="services-row-name">${esc(m.name)}</div>
          ${editable ? `<button class="icon-btn" onclick="confirmDeleteMachine('${m.id}', '${esc(m.name).replace(/'/g,"\\'")}')">${icon("trash-2",{size:15,color:"var(--rust)"})}</button>` : ""}
        </div>
      `).join("")}

    ${isAdmin() ? renderUsersSection() : ""}

  return html;
}

function renderUsersSection() {
  const rows = state.usersListLoading
    ? `<div class="services-empty">جاري التحميل...</div>`
    : (state.usersList.length === 0
        ? `<div class="services-empty">لسه مفيش مستخدمين تانيين</div>`
        : state.usersList.map(u => `
            <div class="services-row" style="align-items:flex-start; flex-wrap:wrap; row-gap:8px;">
              ${icon("user",{size:16,color: u.disabled ? "var(--ink-40)" : "var(--ink-60)"})}
              <div style="flex:1; min-width:130px;">
                <div class="services-row-name" style="${u.disabled?'color:var(--ink-40);text-decoration:line-through;':''}">${esc(u.username)}</div>
                <div style="font-size:11.5px; color:var(--ink-60); margin-top:3px;">${esc(roleLabel(u.role))}${u.disabled ? " · معطّل" : ""}</div>
              </div>
              ${u.role !== "admin" ? `
                <div style="display:flex; align-items:center; gap:6px;">
                  <button class="chip-btn small" onclick="toggleUserRole('${u.id}')">${u.role === "editor" ? "رؤية فقط" : "رؤية وتعديل"}</button>
                  <button class="icon-btn" title="${u.disabled?'تفعيل':'تعطيل'}" onclick="toggleUserDisabled('${u.id}')">${icon(u.disabled?"check-circle-2":"trash-2",{size:15,color: u.disabled ? "var(--emerald)" : "var(--rust)"})}</button>
                </div>
              ` : `<div style="font-size:11px;color:var(--ink-40);">حساب أساسي</div>`}
            </div>
          `).join(""));
  return `
    <div class="services-header-row">
      <div class="archive-title" style="margin-bottom:0;">إدارة المستخدمين</div>
      <button class="add-btn" onclick="openAddUserSheet()">${icon("plus",{size:15})} إضافة مستخدم</button>
    </div>
    <div class="services-list" style="margin-bottom:20px;">${rows}</div>
  `;
}

/* ---- wallet name/limit/commission edit helpers ---- */
function startEditWallet(id) { if (!requireEdit()) return; state.editingWalletId = id; render(); }
function saveWalletName(id) {
  if (!requireEdit()) { state.editingWalletId = null; render(); return; }
  const el = document.getElementById("wallet-edit-input");
  const name = el ? el.value.trim() : "";
  if (name) { state.walletNames = { ...state.walletNames, [id]: name }; saveWalletNames(state.walletNames); }
  state.editingWalletId = null; render();
}
function startEditWalletLimit(id) { if (!requireEdit()) return; state.editingWalletLimitId = id; render(); }
function saveWalletLimitUsed(id) {
  if (!requireEdit()) { state.editingWalletLimitId = null; render(); return; }
  const el = document.getElementById("wl-limit-input-" + id);
  const used = el ? num(el.value) : num(state.walletLimits[id]);
  state.walletLimits = { ...state.walletLimits, [id]: used };
  saveWalletLimits(state.walletLimits);
  state.editingWalletLimitId = null; render();
}
/* ✦ NEW: عمولة المحفظة */
function startEditWalletCommission(id) { if (!requireEdit()) return; state.editingWalletCommissionId = id; render(); }
function saveWalletCommission(id) {
  if (!requireEdit()) { state.editingWalletCommissionId = null; render(); return; }
  const el = document.getElementById("wc-input-" + id);
  const comm = el ? num(el.value) : num(state.walletCommissions?.[id]);
  state.walletCommissions = { ...state.walletCommissions, [id]: comm };
  saveWalletCommissions(state.walletCommissions);
  state.editingWalletCommissionId = null; render();
}
function confirmDeleteMachine(id, name) {
  if (!requireEdit()) return;
  if (confirm(`حذف "${name}"؟`)) { state.machines = state.machines.filter(m => m.id !== id); saveMachines(state.machines); render(); }
}

/* ===============================================================
   Anti-zoom
   =============================================================== */
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
let __lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - __lastTouchEnd <= 300) e.preventDefault();
  __lastTouchEnd = now;
}, { passive: false });
document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });

/* ===============================================================
   Boot
   =============================================================== */
bootApp();
</script>
