<title>دفتر المحل</title>
<meta name="theme-color" content="#17262b" id="theme-color-meta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="دفتر المحل">
<link rel="manifest" id="pwa-manifest-link">
<script>
  // ✦ يحدد الوضع الليلي/النهاري فورًا قبل أي رسم للصفحة، عشان مفيش ولا لمحة (flash) من اللون الغلط
  (function () {
    try {
      var saved = localStorage.getItem("cashapp_theme");
      var theme = (saved === "dark" || saved === "light") ? saved
        : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
      var metaColor = document.getElementById("theme-color-meta");
      if (metaColor) metaColor.setAttribute("content", theme === "dark" ? "#000000" : "#17262b");
    } catch (e) {}
  })();
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root {
    --ink: #17262b; --ink-08: rgba(23,38,43,0.06); --ink-10: rgba(23,38,43,0.10);
    --ink-15: rgba(23,38,43,0.15); --ink-20: rgba(23,38,43,0.20); --ink-40: rgba(23,38,43,0.45);
    --ink-60: rgba(23,38,43,0.65); --paper: #f2ecda; --paper-2: #e8dfc4;
    --emerald: #1f6f54; --steel: #35607a; --gold: #ad7a26; --rust: #a13a2a;
    --surface: #ffffff; --surface-2: #f7f4ea;
    --header-bg: #17262b; --header-fg: #f2ecda; --header-fg-dim: rgba(242,236,218,0.45);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --tabbar-h: calc(65px + var(--safe-b));
    --actionbar-h: 54px;
    --actionbar-gap: 12px;
  }
  /* ✦ Dark mode: أسود AMOLED خالص - من غير أي لون بيج/كريمي خالص */
  html[data-theme="dark"] {
    --ink: #f0f0f0; --ink-08: rgba(240,240,240,0.08); --ink-10: rgba(240,240,240,0.12);
    --ink-15: rgba(240,240,240,0.18); --ink-20: rgba(240,240,240,0.24); --ink-40: rgba(240,240,240,0.5);
    --ink-60: rgba(240,240,240,0.72); --paper: #000000; --paper-2: #0d0d0d;
    --emerald: #3ea884; --steel: #6ea3c4; --gold: #d6a24a; --rust: #e0685a;
    --surface: #0a0a0a; --surface-2: #131313;
    --header-bg: #000000; --header-fg: #f0f0f0; --header-fg-dim: rgba(240,240,240,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    touch-action: pan-x pan-y;
    -ms-touch-action: pan-x pan-y;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
  }
  body {
    background: var(--header-bg);
    display: flex;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    color: var(--ink);
  }
  button { font-family: inherit; cursor: pointer; }
  input:focus { border-color: var(--ink) !important; }
  .num { direction: ltr; font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; unicode-bidi: embed; }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }

  #shell {
    width: 100%; max-width: 480px; background: var(--paper);
    min-height: 100vh; min-height: 100svh; position: relative;
    overflow-x: hidden;
  }
  /* ✦ Responsive: وسّع الحاوية تدريجيًا على الشاشات الأكبر (تابلت / لابتوب / ديسكتوب) */
  @media (min-width: 640px) {
    #shell { max-width: 620px; box-shadow: 0 0 60px rgba(0,0,0,0.35); }
    .tab-bar, .action-bar-inner { max-width: 620px; }
  }
  @media (min-width: 900px) {
    #shell { max-width: 760px; }
    .tab-bar, .action-bar-inner { max-width: 760px; }
    .balance-row2 { grid-template-columns: repeat(4, 1fr); }
    .fawry-card-subs { grid-template-columns: repeat(3, 1fr); }
    .content { padding-left: 22px; padding-right: 22px; }
  }
  @media (min-width: 1280px) {
    #shell { max-width: 920px; }
    .tab-bar, .action-bar-inner { max-width: 920px; }
  }

  /* Header */
  .app-header {
    background: var(--header-bg); color: var(--header-fg);
    padding: 22px 18px 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
  }
  .app-header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; row-gap: 8px; }
  .app-header-logo {
    width: 38px; height: 38px; border-radius: 10px; background: var(--header-fg);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .app-header-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px; }
  .app-header-date { font-size: 12.5px; color: var(--header-fg); opacity: 0.65; white-space: nowrap; }
  .app-header-profit { margin-inline-start: auto; text-align: left; min-width: 0; }
  .app-header-profit-label { font-size: 11px; opacity: 0.6; white-space: nowrap; }
  .app-header-profit-value { font-size: 17px; font-weight: 700; white-space: nowrap; }

  .content { padding: 14px 16px calc(var(--tabbar-h) + var(--actionbar-h) + var(--actionbar-gap) + 24px); }

  /* Balance cards */
  .balance-grid-wrap { margin-bottom: 16px; }
  .balance-section-label { font-size: 12px; font-weight: 700; color: var(--ink-60); margin: 10px 2px 6px; }
  .balance-section-header { display: flex; align-items: center; justify-content: space-between; margin: 10px 2px 6px; }
  .toolbar-btn {
    background: var(--surface); border: 1px solid var(--ink-10); border-radius: 10px; padding: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .toolbar-btn:active { background: var(--ink-08); }
  .balance-collapsed-hint {
    font-size: 12px; color: var(--ink-40); background: var(--surface); border: 1px dashed var(--ink-15);
    border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 8px;
  }
  .balance-card-limit { font-size: 10.5px; font-weight: 600; margin-top: 4px; }
  .balance-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .balance-row-flex { display: flex; gap: 8px; }
  .balance-card {
    background: var(--surface); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    flex: 1; min-width: 0;
  }
  .balance-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .balance-card-label {
    font-size: 11.5px; color: var(--ink-60); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .balance-card-value { font-size: 17px; font-weight: 700; color: var(--ink); }
  .balance-card-value.negative { color: var(--rust); }

  /* Fawry wide card */
  .fawry-card {
    background: var(--surface); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    grid-column: 1 / -1;
  }
  .fawry-card-title {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13.5px; color: var(--ink);
    margin-bottom: 10px;
  }
  .fawry-card-subs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .fawry-sub { min-width: 0; text-align: center; }
  .fawry-sub:not(:first-child) { border-inline-start: 1px solid var(--ink-08); padding-inline-start: 10px; }
  .fawry-sub-label {
    font-size: 11px; color: var(--ink-60); font-weight: 600; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fawry-sub-value { font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .fawry-sub-value.negative { color: var(--rust); }

  /* Instapay wide card */
  .instapay-wide-card {
    background: var(--surface); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--ink-10);
    margin-bottom: 8px;
  }
  .instapay-wide-title {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 13px; color: var(--ink);
    margin-bottom: 8px;
  }
  .instapay-subs { display: flex; gap: 8px; flex-wrap: wrap; }
  .instapay-sub-card {
    flex: 1; min-width: 100px; background: var(--paper); border-radius: 10px; padding: 8px 10px;
    border: 1px solid var(--ink-08);
  }
  .instapay-sub-label { font-size: 11px; color: var(--ink-60); font-weight: 600; margin-bottom: 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .instapay-sub-value { font-size: 14px; font-weight: 700; }
  .instapay-sub-value.negative { color: var(--rust); }

  /* Empty / start state */
  .empty-state { text-align: center; padding: 40px 10px; }
  .empty-state-icon {
    width: 64px; height: 64px; border-radius: 18px; background: var(--surface); margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center; border: 1px solid var(--ink-10);
  }
  .empty-state-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 17px; margin-bottom: 6px; }
  .empty-state-desc { font-size: 13.5px; color: var(--ink-60); margin-bottom: 22px; line-height: 1.6; }

  /* Primary button */
  .primary-btn {
    width: 100%; padding: 13px 16px; border-radius: 14px; border: none;
    background: var(--ink); color: var(--paper);
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 15.5px;
  }
  .primary-btn:disabled { background: var(--ink-20); cursor: default; }

  /* Transactions list header */
  .tx-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; row-gap: 6px; }
  .tx-list-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14.5px; }
  .tx-list-count { font-size: 12px; color: var(--ink-40); }
  .tx-list-box { background: var(--surface); border-radius: 16px; border: 1px solid var(--ink-10); padding: 4px 10px; }
  .tx-list-box.empty { padding: 20px; }
  .tx-list-empty { text-align: center; color: var(--ink-40); font-size: 13px; padding: 10px 0; }

  .tx-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--ink-08); }
  .tx-row:last-child { border-bottom: none; }
  .tx-row-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tx-row-body { flex: 1; min-width: 0; }
  .tx-row-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .tx-row-sub { font-size: 11.5px; color: var(--ink-40); }
  .tx-row-amt { text-align: left; }
  .tx-row-amt-val { font-size: 14.5px; font-weight: 700; }
  .tx-row-profit { font-size: 11px; color: var(--emerald); }
  .tx-row-commission { font-size: 11px; color: var(--rust); }
  .tx-row-actions { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; padding: 5px; display: flex; align-items: center; justify-content: center; }

  /* Floating action bar */
  .action-bar {
    position: fixed; bottom: calc(var(--tabbar-h) + var(--actionbar-gap)); left: 0; right: 0;
    display: flex; justify-content: center; z-index: 20;
    transform: translateZ(0); will-change: transform;
  }
  .action-bar-inner { width: 100%; max-width: 480px; padding: 0 16px; display: flex; gap: 10px; }
  .action-bar-add {
    flex: 1; min-height: var(--actionbar-h); background: var(--ink); color: var(--paper); border: none; border-radius: 14px; padding: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14.5px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  .action-bar-close {
    min-height: var(--actionbar-h); background: var(--surface); color: var(--ink); border: 1.5px solid var(--ink-15); border-radius: 14px;
    padding: 13px 16px; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px;
    white-space: nowrap;
  }

  /* Closed stamp */
  .closed-stamp {
    background: var(--surface); border-radius: 16px; padding: 18px 16px; margin-bottom: 16px; text-align: center;
  }
  .closed-stamp-badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 999px;
    transform: rotate(-3deg); font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 15px; margin-bottom: 10px;
  }
  .closed-stamp-sub { font-size: 12.5px; color: var(--ink-60); }
  .closed-stamp-diff { margin-top: 8px; font-size: 13px; }

  /* Sheets (modal) */
  .sheet-overlay { position: fixed; inset: 0; z-index: 50; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(15,20,22,0.55); }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; max-height: 88vh;
    background: var(--paper); border-top-left-radius: 22px; border-top-right-radius: 22px;
    display: flex; flex-direction: column; box-shadow: 0 -8px 30px rgba(0,0,0,0.35);
  }
  .sheet-grip-wrap { display: flex; justify-content: center; padding-top: 10px; }
  .sheet-grip { width: 40px; height: 4px; border-radius: 99px; background: var(--ink-20); }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
  .sheet-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px; color: var(--ink); }
  .sheet-close-btn {
    background: var(--ink-08); border: none; border-radius: 999px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .sheet-body { overflow-y: auto; padding: 4px 18px 18px; }
  .sheet-footer { padding: 12px 18px 20px; border-top: 1px solid var(--ink-10); }

  .field { margin-bottom: 14px; }
  .field-label { font-family: 'Tajawal', sans-serif; font-size: 13px; color: var(--ink-60); margin-bottom: 6px; font-weight: 600; }
  .input {
    width: 100%; box-sizing: border-box; border: 1.5px solid var(--ink-15); border-radius: 12px;
    padding: 11px 13px; font-size: 16px; font-family: 'Tajawal', sans-serif; background: var(--surface); color: var(--ink); outline: none;
    touch-action: manipulation;
  }
  .field-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .field-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .field-row { display: flex; gap: 10px; }
  .field-row > .field { flex: 1; }

  .chip-row { display: flex; gap: 8px; }
  .chip-row.wrap { flex-wrap: wrap; }
  .chip-btn {
    flex: 1; padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--ink-15);
    background: var(--surface); color: var(--ink); font-size: 13px; font-weight: 700; text-align: center;
  }
  .chip-btn.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .chip-btn.small { flex: none; padding: 9px 14px; font-size: 13.5px; font-weight: 600; }

  .subtype-btn {
    flex: 1; padding: 11px 8px; border-radius: 12px; border: 1.5px solid var(--ink-15);
    background: var(--surface); color: var(--ink-60); font-size: 13.5px; font-weight: 700;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .subtype-btn.withdraw.active { border-color: var(--steel); background: #e7ecef; color: var(--steel); }
  .subtype-btn.deposit.active { border-color: var(--emerald); background: #e4eeea; color: var(--emerald); }

  .warn-box { font-size: 13px; color: var(--rust); background: #f3e0da; padding: 12px; border-radius: 10px; margin-bottom: 14px; }
  .info-box { font-size: 13px; color: var(--steel); background: #e7ecef; padding: 12px; border-radius: 10px; margin-bottom: 14px; }

  .close-row { margin-bottom: 14px; background: var(--surface); border-radius: 14px; padding: 13px; border: 1px solid var(--ink-10); }
  .close-row-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .close-row-label { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .close-row-expected { font-size: 12px; color: var(--ink-60); }
  .close-row-diff { margin-top: 6px; font-size: 12.5px; }
  .close-intro { font-size: 12.5px; color: var(--ink-60); margin-bottom: 14px; line-height: 1.6; }

  /* Archive */
  .archive-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
  .archive-empty { text-align: center; color: var(--ink-40); font-size: 13px; padding: 40px 0; }
  .archive-list { background: var(--surface); border-radius: 16px; border: 1px solid var(--ink-10); overflow: hidden; }
  .archive-list-item {
    width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
    background: none; border: none; border-top: 1px solid var(--ink-08); text-align: right;
  }
  .archive-list-item:first-child { border-top: none; }
  .archive-list-item-date { font-size: 14px; font-weight: 600; color: var(--ink); }
  .archive-back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--ink-60); font-size: 13.5px; margin-bottom: 12px; }
  .archive-detail-title { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 16px; margin-bottom: 4px; }
  .archive-detail-sub { font-size: 12.5px; color: var(--ink-60); margin-bottom: 14px; }
  .section-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px; margin: 14px 0 8px; }

  /* Services view */
  .services-list { background: var(--surface); border-radius: 16px; border: 1px solid var(--ink-10); overflow: hidden; margin-bottom: 20px; }
  .services-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--ink-08); }
  .services-row:first-child { border-top: none; }
  .services-row-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--ink); }
  .services-row-input { width: 100%; box-sizing: border-box; border: 1.5px solid var(--ink-15); border-radius: 12px; padding: 6px 10px; font-size: 16px; font-family: 'Tajawal', sans-serif; }
  .services-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .add-btn { display: flex; align-items: center; gap: 5px; background: var(--ink); color: var(--paper); border: none; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
  .services-empty { padding: 18px; text-align: center; color: var(--ink-40); font-size: 13px; }

  /* Tab bar */
  .tab-bar-wrap {

function waitForFirebaseSDK(timeoutMs) {
  timeoutMs = timeoutMs || 20000;
  return new Promise((resolve, reject) => {
    const start = Date.now();
    (function poll() {
      if (typeof firebase !== "undefined" && firebase.apps) { resolve(); return; }
      if (Date.now() - start > timeoutMs) { reject(new Error("firebase-sdk-timeout")); return; }
      setTimeout(poll, 100);
    })();
  });
}

function reportSaveError(msg) {
  console.error(msg);
  state.saveError = msg;
  render();
}

/* ---- Firestore helpers ---- */
function saveMachines(machines) {

  db.collection("meta").doc("machines").set({ list: machines })
    .catch(err => reportSaveError("فشل حفظ بيانات المكن: " + (err.message || err.code)));
}

/* ✦ NEW: يوم الشغل الحالي — عشان لو الساعة عدت ١٢ بليل، اليوم يفضل مفتوح لحد ما تقفله بنفسك */
function saveCurrentDayKey(key) {
  if (!db) return;
  db.collection("meta").doc("currentDay").set({ key })
    .catch(err => console.error("saveCurrentDayKey failed", err));
}
function fetchCurrentDayKey() {
  if (!db) return Promise.resolve(null);
  return db.collection("meta").doc("currentDay").get()
    .then(snap => snap.exists ? (snap.data().key || null) : null);
}
function fetchArchiveList() {
  if (!db) return Promise.resolve([]);
  return db.collection("days")
    .get()
    .then(snap => snap.docs.map(d => d.id).sort((a, b) => b.localeCompare(a)).slice(0, 90));
}
function fetchArchiveDay(key) {
  if (!db) return Promise.resolve(null);
  return db.collection("days").doc(key).get()
    .then(snap => snap.exists ? snap.data() : null);
}

/* ===============================================================
   Date / Format helpers
   =============================================================== */
const AR_MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const AR_DAYS = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function pad(n){ return String(n).padStart(2,"0"); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function displayDate(key){
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return `${AR_DAYS[dt.getDay()]} ${d} ${AR_MONTHS[m-1]} ${y}`;
}
function timeNow(){
  const d = new Date();
  let h = d.getHours(); const m = pad(d.getMinutes());
  const ampm = h >= 12 ? "م" : "ص";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m} ${ampm}`;
}
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function money(n){
  const v = Number(n)||0;
  return v.toLocaleString("en-US", { minimumFractionDigits: v % 1 !== 0 ? 2 : 0, maximumFractionDigits: 2 });
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===============================================================
   Domain model
   =============================================================== */
const WALLET_IDS = ["w1","w2","w3","w4"];
const WALLET_LIMIT_TOTAL = 200000;
const FAWRY_SUBS = ["مدفوعات", "خدمات موبايل", "فيزا"];
const FAWRY_NO_NEGATIVE_EXEMPT = "مدفوعات";
function machineSubs(m) { return (m && m.name === "فوري") ? FAWRY_SUBS : null; }
function emptyFawryBalance() { return { "مدفوعات": 0, "خدمات موبايل": 0, "فيزا": 0 }; }
function machineBalValue(bal, sub) {
  if (sub) return num(bal && typeof bal === "object" ? bal[sub] : 0);
  return num(bal);
}

/* ✦ NEW: حسابات انستاباي الافتراضية */
const DEFAULT_INSTAPAY_ACCOUNTS = [
  { id: "ip1", name: "انستاباي 1" }
];

const emptyOpening = () => ({
  drawer: 0, machineDrawer: 0,
  wallets: { w1:0,w2:0,w3:0,w4:0 },
  instapay: 0,           // ← للتوافق مع البيانات القديمة
  instapayAccounts: {},  // ✦ NEW: { [accountId]: balance }
  machines: {},
  machineDebts: {},       // ✦ NEW: { [machineId]: debtAmount }
  islamBalance: 0
});
const emptyDay = () => ({ status: "not_started", opening: emptyOpening(), transactions: [], closing: null, closedAt: null });

/* ✦ UPDATED: computeLive يدعم حسابات انستاباي المتعددة + عمولة المحفظة */
function computeLive(dayData){
  const o = dayData.opening || emptyOpening();
  let drawer = o.drawer;
  let machineDrawer = o.machineDrawer || 0;
  // دعم الحساب القديم (instapay رقم) والجديد (instapayAccounts كائن)
  let instapay = o.instapay || 0; // legacy single
  const instapayAccounts = {};
  // ابدأ من الأرصدة الافتتاحية
  (state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS).forEach(acc => {
    instapayAccounts[acc.id] = num(o.instapayAccounts?.[acc.id] ?? 0);
  });
  let islamBalance = o.islamBalance || 0;
  const wallets = { ...o.wallets };
  const machines = { ...(o.machines || {}) };
  const machineDebts = { ...(o.machineDebts || {}) }; // ✦ NEW: مديونية المكن
  const machineDebtSubs = JSON.parse(JSON.stringify(o.machineDebtSubs || {})); // ✦ NEW: تفصيل مديونية فوري (مدفوعات/خدمات موبايل)

  (dayData.transactions || []).forEach(t => {
    const amt = num(t.amount);
    const p = num(t.profit);
    const comm = num(t.commission); // ✦ NEW: عمولة المحفظة

    if (t.category === "vodafone") {
      if (t.subtype === "سحب") {
        drawer += (-amt + p);
        wallets[t.walletId] = (wallets[t.walletId]||0) + amt;
        // ✦ عمولة المحفظة: تتخصم من المحفظة
        if (comm > 0) wallets[t.walletId] = (wallets[t.walletId]||0) - comm;
      }
      if (t.subtype === "إيداع") {
        drawer += (amt + p);
        wallets[t.walletId] = (wallets[t.walletId]||0) - amt;
        // ✦ عمولة المحفظة: تتخصم من المحفظة
        if (comm > 0) wallets[t.walletId] = (wallets[t.walletId]||0) - comm;
      }
    } else if (t.category === "instapay") {
      const accId = t.instapayAccountId || "ip1";
      if (t.subtype === "سحب") {
        drawer += (-amt + p);
        instapayAccounts[accId] = (instapayAccounts[accId] || 0) + amt;
        instapay += amt; // legacy compat
      }
      if (t.subtype === "إيداع") {
        drawer += (amt + p);
        instapayAccounts[accId] = (instapayAccounts[accId] || 0) - amt;
        instapay -= amt; // legacy compat
      }
    } else if (t.category === "islam") {
      if (t.subtype === "سحب") { drawer += (-amt + p); islamBalance += amt; }
      if (t.subtype === "إيداع") { drawer += (amt + p); islamBalance -= amt; }
    } else if (t.category === "machine") {
      const sub = t.machineSub;
      if (sub === "فيزا") {
        drawer += (-amt + p);
        const cur = machines[t.machineId];
        const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
        obj["فيزا"] = (obj["فيزا"] || 0) + amt;
        machines[t.machineId] = obj;
      } else if (sub) {
        machineDrawer += (amt + p);
        const cur = machines[t.machineId];
        const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
        obj[sub] = (obj[sub] || 0) - amt;
        machines[t.machineId] = obj;
      } else {
        machineDrawer += (amt + p);
        machines[t.machineId] = (machines[t.machineId] || 0) - amt;
      }
    } else if (t.category === "expense") {
      drawer -= amt;
    } else if (t.category === "cash") {
      drawer += amt;
    } else if (t.category === "machineDebt") {
      // ✦ NEW: إضافة مديونية على مكينة + زيادة رصيد المكينة بنفس المبلغ
      const debtMachine = state.machines.find(mm => mm.id === t.machineId);
      const debtSubs = machineSubs(debtMachine);
      if (debtSubs) {
        // فوري: مبلغ المديونية ممكن يكون مقسّم بين "مدفوعات" و"خدمات موبايل"
        const madfoatPart = num(t.debtMadfoat ?? t.amount ?? 0); // توافق مع بيانات قديمة (كانت كلها بتروح مدفوعات)
        const khadamatPart = num(t.debtKhadamat ?? 0);
        const totalDebt = madfoatPart + khadamatPart;
        machineDebts[t.machineId] = (machineDebts[t.machineId] || 0) + totalDebt;
        const subsDebt = machineDebtSubs[t.machineId] || { "مدفوعات": 0, "خدمات موبايل": 0 };
        subsDebt["مدفوعات"] = (subsDebt["مدفوعات"] || 0) + madfoatPart;
        subsDebt["خدمات موبايل"] = (subsDebt["خدمات موبايل"] || 0) + khadamatPart;
        machineDebtSubs[t.machineId] = subsDebt;
        const cur = machines[t.machineId];
        const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
        obj["مدفوعات"] = (obj["مدفوعات"] || 0) + madfoatPart;
        obj["خدمات موبايل"] = (obj["خدمات موبايل"] || 0) + khadamatPart;
        machines[t.machineId] = obj;
      } else {
        // باقي المكن: رصيد عادي
        machineDebts[t.machineId] = (machineDebts[t.machineId] || 0) + amt;
        machines[t.machineId] = (machines[t.machineId] || 0) + amt;
      }
    } else if (t.category === "machineDebtPayment") {
      // ✦ NEW: سداد مديونية مكينة من الدرج (كاش)
      drawer -= amt;
      const debtBefore = machineDebts[t.machineId] || 0;
      machineDebts[t.machineId] = debtBefore - amt;
      // ✦ لو المكينة فوري، قلّل تفصيل المدفوعات/خدمات موبايل بنفس النسبة
      const paySubs = machineDebtSubs[t.machineId];
      if (paySubs && debtBefore > 0.005) {
        const ratio = amt / debtBefore;
        paySubs["مدفوعات"] = (paySubs["مدفوعات"] || 0) * (1 - ratio);
        paySubs["خدمات موبايل"] = (paySubs["خدمات موبايل"] || 0) * (1 - ratio);
      }
    } else if (t.category === "fawrySettlement") {
      // ✦ NEW: تسوية فوري — المندوب بياخد كاش قد "مدفوعات" (و"خدمات موبايل") وبيدّي كاش قد "فيزا"، وممكن يزود رصيد "مدفوعات"/"خدمات موبايل"
      const paidFromMadfoat = num(t.fawryPaidFromMadfoat);   // المبلغ المسدد (المأخوذ) من المدفوعات
      const paidFromKhadamat = num(t.fawryPaidFromKhadamat); // ✦ NEW: المبلغ المسدد (المأخوذ) من خدمات موبايل
      const paidFromVisa = num(t.fawryPaidFromVisa);         // المبلغ المدفوع من الفيزا
      const topUpMadfoat = num(t.fawryTopUpMadfoat);         // مبلغ إضافي يتزود على المدفوعات
      const topUpKhadamat = num(t.fawryTopUpKhadamat);       // ✦ NEW: مبلغ إضافي يتزود على خدمات موبايل
      drawer += (-paidFromMadfoat - paidFromKhadamat + paidFromVisa - topUpMadfoat - topUpKhadamat);
      const cur = machines[t.machineId];
      const obj = (cur && typeof cur === "object") ? { ...cur } : emptyFawryBalance();
      const madfoatBefore = obj["مدفوعات"] || 0;
      const khadamatBefore = obj["خدمات موبايل"] || 0;
      // ✦ المسدد بيحرّك الرصيد ناحية الصفر (لو الرصيد سالب بيتزود، لو موجب بيتقل)، والزيادة الإضافية بتتضاف عادي
      const madfoatAfterPayment = madfoatBefore < 0 ? (madfoatBefore + paidFromMadfoat) : (madfoatBefore - paidFromMadfoat);
      const khadamatAfterPayment = khadamatBefore < 0 ? (khadamatBefore + paidFromKhadamat) : (khadamatBefore - paidFromKhadamat);
      obj["مدفوعات"] = madfoatAfterPayment + topUpMadfoat;
      obj["خدمات موبايل"] = khadamatAfterPayment + topUpKhadamat;
      obj["فيزا"] = (obj["فيزا"] || 0) - paidFromVisa;
      machines[t.machineId] = obj;
      // ✦ NEW: ربط المبلغ المسدد بسداد مديونية فوري (لو مفعّل) — لكل من مدفوعات وخدمات موبايل
      const debtReduction = num(t.fawryDebtReduction);
      if (debtReduction > 0) {
        machineDebts[t.machineId] = (machineDebts[t.machineId] || 0) - debtReduction;
        const settleSubs = machineDebtSubs[t.machineId];
        if (settleSubs) settleSubs["مدفوعات"] = (settleSubs["مدفوعات"] || 0) - debtReduction;
      }
      const debtReductionKhadamat = num(t.fawryDebtReductionKhadamat); // ✦ NEW
      if (debtReductionKhadamat > 0) {
        machineDebts[t.machineId] = (machineDebts[t.machineId] || 0) - debtReductionKhadamat;
        const settleSubs2 = machineDebtSubs[t.machineId];
        if (settleSubs2) settleSubs2["خدمات موبايل"] = (settleSubs2["خدمات موبايل"] || 0) - debtReductionKhadamat;
      }
    }
  });
  return { drawer, machineDrawer, wallets, instapay, instapayAccounts, machines, islamBalance, machineDebts, machineDebtSubs };
}

/* ===============================================================
   Global state
   =============================================================== */
const state = {
  machines: [],
  walletNames: { w1:"محفظة 1", w2:"محفظة 2", w3:"محفظة 3", w4:"محفظة 4" },
  /* ✦ NEW */
  instapayAccounts: DEFAULT_INSTAPAY_ACCOUNTS,
  instapayAccountsReady: false,
  /* ✦ NEW: عمولات المحافظ { w1: 0, w2: 0, ... } */
  walletCommissions: { w1:0, w2:0, w3:0, w4:0 },
  walletCommissionsReady: false,

  archiveIndex: [],
  archiveLoading: false,
  archiveError: null,
  today: dateKey(new Date()),
  dayData: emptyDay(),
  tab: "today",
  viewDate: null,
  archiveDayData: null,
  archiveDetailError: null,
  sheet: null,
  txForm: null,
  editingWalletId: null,
  editingWalletLimitId: null,
  editingWalletCommissionId: null,
  editingInstapayId: null,
  busy: false,
  ready: false,
  connectionError: null,
  machinesReady: false,
  walletNamesReady: false,
  walletLimitsReady: false,
  dayReady: false,
  fbReady: false,
  authUser: null,
  authChecked: false,
  listenersAttached: false,
  unsubscribers: [],
  loginError: null,
  loginSubmitting: false,
  saveError: null,
  balancesHidden: false,
  collapsedSections: { main: false, wallets: false, machines: false },
  walletLimits: { w1: 0, w2: 0, w3: 0, w4: 0 },
  userProfile: null,
  userProfileReady: false,
  usersList: [],
  usersListLoading: false,
  newUserForm: null,
  addUserError: null,
  addUserBusy: false,
  /* ✦ NEW: وضع تعديل يوم من الأرشيف */
  editingArchiveDay: false,
  liveDayBackup: null, // { key, data } — نسخة من اليوم الحالي وقت الدخول لوضع تعديل الأرشيف
  balanceBreakdownMachineId: null, // ✦ NEW: لعرض تفاصيل حساب رصيد فوري (تشخيص)
  theme: "light", // ✦ NEW: "light" أو "dark"
};

try {
  state.balancesHidden = localStorage.getItem("cashapp_balancesHidden") === "1";
  const savedSections = JSON.parse(localStorage.getItem("cashapp_collapsedSections") || "null");
  if (savedSections) state.collapsedSections = { ...state.collapsedSections, ...savedSections };
} catch (e) {}

/* ✦ NEW: Dark mode — بيقرأ آخر اختيار محفوظ، وإلا بيتبع إعدادات الجهاز */
try {
  const savedTheme = localStorage.getItem("cashapp_theme");
  if (savedTheme === "dark" || savedTheme === "light") {
    state.theme = savedTheme;
  } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
    state.theme = "dark";
  }
} catch (e) {}
applyTheme();

function isDarkMode() { return state.theme === "dark"; }
function applyTheme() {
  document.documentElement.setAttribute("data-theme", state.theme);
  const meta = document.getElementById("theme-color-meta");
  if (meta) meta.setAttribute("content", state.theme === "dark" ? "#000000" : "#17262b");
}
function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  try { localStorage.setItem("cashapp_theme", state.theme); } catch (e) {}
  applyTheme();
  render();
}

function toggleBalancesHidden() {
  state.balancesHidden = !state.balancesHidden;
  try { localStorage.setItem("cashapp_balancesHidden", state.balancesHidden ? "1" : "0"); } catch (e) {}
  render();
}
function toggleSection(key) {
  state.collapsedSections = { ...state.collapsedSections, [key]: !state.collapsedSections[key] };
  try { localStorage.setItem("cashapp_collapsedSections", JSON.stringify(state.collapsedSections)); } catch (e) {}
  render();
}

/* ===============================================================
   Realtime listeners
   =============================================================== */
const LISTENER_RETRY_DELAYS = [1000, 2000, 4000, 8000, 15000];

function attachRealtimeListeners() {
  if (state.listenersAttached) return;
  state.listenersAttached = true;
  state.unsubscribers = [];
  attachMachinesListener(0);
  attachWalletNamesListener(0);
  attachWalletLimitsListener(0);
  attachInstapayAccountsListener(0);   // ✦ NEW
  attachWalletCommissionsListener(0);  // ✦ NEW
  resolveWorkingDayAndAttach(0);
}

/* ✦ NEW: يحدد يوم الشغل الصح (ممكن يكون يوم سابق لسه مفتوح لو الساعة عدت ١٢ بليل) قبل ما يربط الـ listener */
function resolveWorkingDayAndAttach(retryCount) {
  fetchCurrentDayKey().then(key => {
    if (key) {
      state.today = key;
    } else {
      // أول مرة يفتح فيها التطبيق — سجّل يوم النهاردة كيوم الشغل الحالي
      saveCurrentDayKey(state.today);
    }
    attachDayListener(0);
  }).catch(err => {
    console.error("resolveWorkingDayAndAttach failed (retry " + retryCount + ")", err);
    if (retryCount < LISTENER_RETRY_DELAYS.length) {
      scheduleRetry(retryCount, () => resolveWorkingDayAndAttach(retryCount + 1));
    } else {
      attachDayListener(0); // كملّ بيوم النهاردة كحل احتياطي بدل ما يعلّق التطبيق
    }
  });
}

function scheduleRetry(retryCount, fn) {
  if (!state.authUser) return;
  const delay = LISTENER_RETRY_DELAYS[Math.min(retryCount, LISTENER_RETRY_DELAYS.length - 1)];
  setTimeout(() => { if (state.authUser) fn(); }, delay);
}

/* ===============================================================
   Auth
   =============================================================== */
const LOGIN_EMAIL_DOMAIN = "@cash.app";
const BOOT_RETRY_DELAYS = [1000, 2000, 4000, 8000];

async function bootApp(retryCount) {
  retryCount = retryCount || 0;
  render();
  try {
    await waitForFirebaseSDK();
    if (!state.fbReady) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      db.settings({ ignoreUndefinedProperties: true });
      try { await db.enablePersistence({ synchronizeTabs: true }); } catch (e) { console.warn("offline persistence not enabled", e.code || e.message); }
      state.fbReady = true;
      firebase.auth().onAuthStateChanged(user => {
        state.authUser = user;
        state.authChecked = true;
        state.loginSubmitting = false;
        if (user) { attachRealtimeListeners(); loadUserProfile(user); }
        else { state.userProfile = null; state.userProfileReady = false; }
        render();
      });
    }
    state.connectionError = null;
    render();
  } catch (e) {
    console.error("boot failed (attempt " + retryCount + ")", e);
    if (retryCount < BOOT_RETRY_DELAYS.length) setTimeout(() => bootApp(retryCount + 1), BOOT_RETRY_DELAYS[retryCount]);
    else showConnectionError();
  }
}

function attemptLogin() {
  const uEl = document.getElementById("login-username");
  const pEl = document.getElementById("login-password");
  const username = (uEl?.value || "").trim().toLowerCase();
  const password = pEl?.value || "";
  if (!username || !password) { state.loginError = "اكتب اسم المستخدم وكلمة المرور"; render(); return; }
  state.loginError = null;
  state.loginSubmitting = true;
  render();
  const email = username + LOGIN_EMAIL_DOMAIN;
  firebase.auth().signInWithEmailAndPassword(email, password)
    .catch(err => {
      state.loginSubmitting = false;
      const map = {
        "auth/operation-not-allowed": `طريقة الدخول (Email/Password) مش مفعّلة في Firebase.`,
        "auth/user-not-found": `مفيش حساب مسجّل بالإيميل "${email}".`,
        "auth/wrong-password": "كلمة المرور غلط.",
        "auth/invalid-credential": `اسم المستخدم أو كلمة المرور مش متطابقين.`,
        "auth/invalid-email": "اسم المستخدم فيه رمز مش مسموح.",
        "auth/user-disabled": "الحساب ده متوقف من Firebase Console.",
        "auth/too-many-requests": "محاولات غلط كتير، استنى شوية وجرب تاني.",
        "auth/network-request-failed": "مفيش اتصال بالإنترنت.",
      };
      state.loginError = map[err.code] || `خطأ (${err.code || "غير معروف"}): ${err.message || ""}`;
      render();
    });
}

   Users & permissions
   =============================================================== */
function loadUserProfile(user) {
  if (!db) return;
  db.collection("users").doc(user.uid).get().then(snap => {
    if (snap.exists) {
      const data = snap.data();
      if (data.disabled) {
        state.userProfile = null; state.userProfileReady = true; render();
        alert("الحساب ده متعطّل من الأدمن.");
        firebase.auth().signOut().then(() => db ? db.terminate() : null).then(() => firebase.firestore().clearPersistence()).catch(err => console.warn("cleanup failed", err)).finally(() => location.reload());
        return;
      }
      state.userProfile = { username: data.username || (user.email||"").split("@")[0], role: data.role || "viewer" };
      state.userProfileReady = true; render(); return;
    }
    db.collection("users").limit(1).get().then(qsnap => {
      const username = (user.email || "").split("@")[0];
      if (qsnap.empty) {
        const profile = { username, role: "admin", disabled: false, createdAt: Date.now() };
        db.collection("users").doc(user.uid).set(profile).catch(err => console.error("seed admin profile failed", err));
        state.userProfile = { username, role: "admin" };
        state.userProfileReady = true; render(); return;
      }
      /* ✦ الحساب ده كان موجود وانحذف بمعرفة الأدمن — امنع الدخول */
      state.userProfile = null; state.userProfileReady = true; render();
      alert("الحساب ده اتحذف من الأدمن.");
      firebase.auth().signOut().then(() => db ? db.terminate() : null).then(() => firebase.firestore().clearPersistence()).catch(err => console.warn("cleanup failed", err)).finally(() => location.reload());
    }).catch(err => { console.error("loadUserProfile bootstrap check failed", err); state.userProfileReady = true; render(); });
  }).catch(err => { console.error("loadUserProfile failed", err); state.userProfileReady = true; render(); });
}
function isAdmin() { return !!state.userProfile && state.userProfile.role === "admin"; }
function canEdit() { return !!state.userProfile && (state.userProfile.role === "admin" || state.userProfile.role === "editor"); }
function requireEdit() {
  if (!canEdit()) { alert("حسابك في وضع (رؤية فقط) ومش هيقدر يعدّل أو يضيف بيانات."); return false; }
  return true;
}
function roleLabel(role) {
  if (role === "admin") return "أدمن";
  if (role === "editor") return "رؤية وتعديل";
  return "رؤية فقط";
}
function loadUsersList() {
  if (!db) return;
  state.usersListLoading = true; render();
  db.collection("users").get().then(snap => {
    state.usersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    state.usersListLoading = false; render();
  }).catch(err => { console.error("loadUsersList failed", err); state.usersListLoading = false; render(); });
}

  state.newUserForm = { username: "", password: "", role: "editor" };

function syncAddUserFormFromInputs() {
  const uEl = document.getElementById("au-username");

    </div>

      </div>

async function submitAddUser() {
  if (!isAdmin()) return;
  syncAddUserFormFromInputs();
  const username = (state.newUserForm.username || "").trim().toLowerCase();
  const password = state.newUserForm.password || "";
  const role = state.newUserForm.role || "editor";
  if (!username || !password) { state.addUserError = "اكتب اسم المستخدم وكلمة المرور"; render(); return; }
  if (password.length < 6) { state.addUserError = "كلمة المرور لازم تكون 6 أحرف على الأقل"; render(); return; }
  state.addUserError = null; state.addUserBusy = true; render();
  const email = username + LOGIN_EMAIL_DOMAIN;
  const secondaryName = "Secondary_" + Date.now();
  let secondaryApp = null;
  try {
    secondaryApp = firebase.initializeApp(FIREBASE_CONFIG, secondaryName);
    const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;
    await db.collection("users").doc(uid).set({ username, role, disabled: false, createdAt: Date.now(), createdBy: state.userProfile?.username || "" });
    await secondaryApp.auth().signOut();
    await secondaryApp.delete();
    state.addUserBusy = false; state.sheet = null; state.newUserForm = null;
    loadUsersList();
  } catch (err) {
    console.error("create user failed", err);
    if (secondaryApp) { try { await secondaryApp.delete(); } catch(e) {} }
    const map = {
      "auth/email-already-in-use": "اسم المستخدم ده متسجل بالفعل.",
      "auth/weak-password": "كلمة المرور ضعيفة.",
      "auth/invalid-email": "اسم المستخدم فيه رمز مش مسموح.",
      "auth/operation-not-allowed": "إنشاء مستخدمين مش مفعّل في Firebase.",
      "auth/network-request-failed": "مفيش اتصال بالإنترنت.",
    };
    state.addUserError = map[err.code] || `حصل خطأ (${err.code || "غير معروف"}): ${err.message || ""}`;
    state.addUserBusy = false; render();
  }
}
function toggleUserRole(id) {
  if (!isAdmin()) return;
  const u = state.usersList.find(x => x.id === id);
  if (!u || u.role === "admin") { if(u && u.role==="admin") alert("مينفعش تغيّر صلاحية الأدمن."); return; }
  const next = u.role === "editor" ? "viewer" : "editor";
  db.collection("users").doc(u.id).update({ role: next }).then(() => loadUsersList()).catch(err => alert("فشل: " + (err.message||err)));
}
function deleteUser(id) {
  if (!isAdmin()) return;
  const u = state.usersList.find(x => x.id === id);
  if (!u || u.role === "admin") { if(u && u.role==="admin") alert("مينفعش تحذف حساب الأدمن."); return; }
  if (!confirm(`حذف حساب "${u.username}" نهائيًا؟ مينفعش ترجّعه بعد كده.`)) return;
  db.collection("users").doc(u.id).delete().then(() => loadUsersList()).catch(err => alert("فشل: " + (err.message||err)));
}
function logout() {
  if (!confirm("تسجيل الخروج؟")) return;
  (state.unsubscribers || []).forEach(u => { try { u(); } catch(e) {} });
  state.unsubscribers = []; state.listenersAttached = false; state.ready = false;
  state.machinesReady = false; state.walletNamesReady = false; state.dayReady = false;
  state.instapayAccountsReady = false; state.walletCommissionsReady = false;
  state.connectionError = null; state.userProfile = null; state.userProfileReady = false; state.usersList = [];
  firebase.auth().signOut()
    .then(() => db ? db.terminate() : null)
    .then(() => firebase.firestore().clearPersistence())
    .catch(err => console.warn("logout cleanup failed", err))
    .finally(() => location.reload());
}

function icon(name, opts) {

function refreshIcons() {}

const TINT15 = {
  "var(--steel)": "#e1e7eb",
  "var(--emerald)": "#dde9e5",
  "var(--gold)": "#f3ebde",
  "var(--rust)": "#f1e1df",
};
const TINT15_DARK = {
  "var(--steel)": "rgba(110,163,196,0.18)",
  "var(--emerald)": "rgba(62,168,132,0.18)",
  "var(--gold)": "rgba(214,162,74,0.18)",
  "var(--rust)": "rgba(224,104,90,0.18)",
};
function tint15(color) {

  return map[color] || (isDarkMode() ? "rgba(240,240,240,0.08)" : "#eee");
}

/* ===============================================================
   Render dispatch
   =============================================================== */
function render() {
  const root = document.getElementById("shell");
  if (state.connectionError) {
    root.innerHTML = `
      <div class="loading-wrap">
        ${icon("alert-triangle", {size:32, color:"var(--rust)"})}
        <div class="loading-text" style="color:var(--rust); text-align:center; padding:0 24px;">${esc(state.connectionError)}</div>
        <button class="primary-btn" style="width:auto; padding:11px 22px;" onclick="location.reload()">إعادة المحاولة</button>
      </div>`;
    return;
  }
  if (!state.fbReady || !state.authChecked) {
    root.innerHTML = `<div class="loading-wrap"><div class="spin">${icon("loader-2", {size:32, color:"var(--ink-40)"})}</div><div class="loading-text">جاري الاتصال...</div></div>`;
    return;
  }
  if (!state.authUser) { root.innerHTML = renderLoginScreen(); return; }
  if (!state.ready) {
    root.innerHTML = `<div class="loading-wrap"><div class="spin">${icon("loader-2", {size:32, color:"var(--ink-40)"})}</div><div class="loading-text">جاري تحميل بيانات المحل...</div></div>`;
    return;
  }

  const live = computeLive(state.dayData);
  const profitTotal = (state.dayData.transactions||[]).reduce((a,t)=>a+num(t.profit),0);

  let bodyHtml = "";
  if (state.tab === "today") bodyHtml = renderTodayView(live);
  else if (state.tab === "archive" && !state.viewDate) bodyHtml = renderArchiveView();
  else if (state.tab === "archive" && state.viewDate) bodyHtml = renderArchiveDetail();
  else if (state.tab === "services") bodyHtml = renderServicesView();

  root.innerHTML = `
    ${renderHeader(state.dayData.status !== "not_started" ? profitTotal : null)}
    ${state.saveError ? `
      <div style="position:sticky; top:0; z-index:40; background:var(--rust); color:#fff; padding:10px 16px; font-size:12.5px; display:flex; align-items:center; gap:8px;">
        ${icon("alert-triangle",{size:15,color:"#fff"})}
        <span style="flex:1;">${esc(state.saveError)}</span>
        <button class="icon-btn" onclick="state.saveError=null; render();">${icon("x",{size:14,color:"#fff"})}</button>
      </div>` : ""}
    <div class="content">${bodyHtml}</div>
    ${renderTabBar()}
    ${state.sheet ? renderSheet() : ""}
  `;
  refreshIcons();
  attachTodayEvents();
}

function renderHeader(profit) {
  return `
    <div class="app-header">
      <div class="app-header-row">
        <div class="app-header-logo">${icon("store", {size:19, color:"var(--header-bg)"})}</div>
        <div>
          <div class="app-header-title">دفتر المحل${state.editingArchiveDay ? " · تعديل أرشيف" : ""}</div>
          <div class="app-header-date">${displayDate(state.today)}</div>
        </div>
        ${profit !== null ? `
          <div class="app-header-profit">
            <div class="app-header-profit-label">مكسب اليوم</div>
            <div class="app-header-profit-value num">${money(profit)} <span style="font-size:11px;font-weight:400;">ج.م</span></div>
          </div>
          ${(canEdit() && !state.editingArchiveDay) ? `
          <button class="icon-btn" title="بدء يوم جديد" onclick="confirmStartNewDay()" style="background:var(--ink-08); border-radius:10px;">
            ${icon("rotate-ccw", {size:17, color:"var(--header-fg)"})}
          </button>` : ""}` : ""}
      </div>
    </div>
  `;
}

function renderTabBar() {
  const items = [
    { key: "today", label: "اليوم", i: "store", dot: state.dayData.status === "open" },
    { key: "archive", label: "الأرشيف", i: "archive" },
    { key: "services", label: "الخدمات", i: "settings" },
  ];
  return `
    <div class="tab-bar-wrap">
      <div class="tab-bar">
        ${items.map(it => `
          <button class="tab-btn ${state.tab===it.key?'active':''}" onclick="setTab('${it.key}')">
            ${icon(it.i, {size:19})}
            <span class="tab-btn-label">${it.label}</span>
            ${it.dot ? '<span class="tab-btn-dot"></span>' : ''}
          </button>
        `).join("")}
      </div>
    </div>
  `;
}

function setTab(t) {
  if (state.editingArchiveDay && t !== "archive") { exitArchiveEditMode(); }
  state.tab = t;
  state.viewDate = null;
  if (t === "archive") {
    state.archiveLoading = true; state.archiveError = null; render();
    fetchArchiveList().then(list => { state.archiveIndex = list; state.archiveLoading = false; render(); })
      .catch(err => { state.archiveError = `تعذر تحميل الأرشيف: ${err.code || ""} ${err.message || err}`; state.archiveLoading = false; render(); });
    return;
  }
  if (t === "services" && isAdmin()) { loadUsersList(); return; }
  render();
}

   Today view

function sectionHeader(key, label, extraRight) {

    <div class="balance-section-header">

      <div style="display:flex; align-items:center; gap:6px;">

function renderBalancesGrid(live) {
  const c = state.collapsedSections;

    <button class="toolbar-btn" title="${state.balancesHidden ? 'إظهار الأرصدة' : 'إخفاء الأرصدة'}" onclick="toggleBalancesHidden()">

  /* ✦ انستاباي: اعرض كارت موسّع لو في أكتر من حساب */

        <div class="balance-row-flex" style="margin-bottom:8px;">

          ${instapayHtml}
        </div>

        ${machineDebtsCard(live)}
      `}

      ${sectionHeader("wallets", "المحافظ الإلكترونية")}
      ${c.wallets ? `<div class="balance-collapsed-hint">المحافظ مخفية</div>` : `
        <div class="balance-row2" style="margin-bottom:8px;">
          ${WALLET_IDS.map(id => balanceCard("wallet", state.walletNames[id], live.wallets[id], id)).join("")}
        </div>
      `}

      ${state.machines.length ? `
        ${sectionHeader("machines", "أرصدة مكن الشحن")}

          <div class="balance-row2" style="margin-bottom:8px;">

/* ✦ NEW: كارت انستاباي موسّع لأكتر من حساب */
function renderInstapayWideCard(live, accounts) {
  const subsHtml = accounts.map(acc => {
    const val = num(live.instapayAccounts?.[acc.id] ?? 0);
    const display = state.balancesHidden ? "••••" : money(val);
    return `
      <div class="instapay-sub-card">
        <div class="instapay-sub-label">${esc(acc.name)}</div>
        <div class="instapay-sub-value num ${val < 0 && !state.balancesHidden ? 'negative' : ''}">${display}</div>
      </div>
    `;
  }).join("");
  return `
    <div class="instapay-wide-card" style="flex:1;">
      <div class="instapay-wide-title">${icon("smartphone",{size:14,color:"var(--ink-60)"})} حسابات انستاباي</div>
      <div class="instapay-subs">${subsHtml}</div>
    </div>
  `;
}

function balanceCard(iconName, label, value, walletId) {
  const neg = value < 0;
  const display = state.balancesHidden ? "••••" : money(value);
  let limitHtml = "";
  if (walletId) {
    const used = num(state.walletLimits[walletId]);
    const remaining = WALLET_LIMIT_TOTAL - used;
    const remColor = remaining < 0 ? "var(--rust)" : "var(--ink-40)";
    const remDisplay = state.balancesHidden ? "••••" : money(remaining);
    limitHtml = `<div class="balance-card-limit num" style="color:${remColor};">متبقي ${remDisplay} من الليميت</div>`;
    /* ✦ NEW: عمولة المحفظة */
    const comm = num(state.walletCommissions?.[walletId]);
    if (comm > 0) {
      limitHtml += `<div class="balance-card-limit" style="color:var(--gold);">عمولة: <span class="num">${money(comm)}</span> ج.م</div>`;
    }
  }
  return `
    <div class="balance-card">
      <div class="balance-card-top">
        ${icon(iconName, {size:13, color:"var(--ink-40)"})}
        <div class="balance-card-label">${esc(label)}</div>
      </div>
      <div class="balance-card-value num ${(neg && !state.balancesHidden)?'negative':''}">${display}</div>
      ${limitHtml}
    </div>
  `;
}

function fawryCard(m, live) {

/* ✦ NEW: كارت مكينة عادية (بدون بنود فرعية) — بنفس فكرة كارت فوري بالظبط: سهم يعرض تفاصيل المعاملات عند الضغط */
function machineCard(m, live) {

  const neg = val < 0;

  return `
    <div class="balance-card">
      <div class="balance-card-top" style="justify-content:space-between;">

      </div>
      <div class="balance-card-value num ${(neg && !state.balancesHidden)?'negative':''}">${display}</div>

/* ✦ NEW: تفاصيل حساب رصيد مكينة عادية (بدون بنود فرعية) — لتتبع مصدر أي رقم غريب */
function renderSimpleMachineBreakdown(m) {
  const o = state.dayData.opening || emptyOpening();
  const openingVal = num(o.machines?.[m.id]);
  const rows = [];
  rows.push({ label: "الرصيد الافتتاحي", amount: openingVal, running: openingVal });
  let running = openingVal;
  (state.dayData.transactions || []).forEach(t => {
    if (t.machineId !== m.id) return;
    let delta = 0, label = "";
    if (t.category === "machine" && !t.machineSub) { delta = -num(t.amount); label = `شحن مكن · ${t.time || ""}`; }
    else if (t.category === "machineDebt") { delta = num(t.amount); label = `مديونية (المكن) · ${t.time || ""}`; }
    else { return; }
    running += delta;
    rows.push({ label, amount: delta, running });
  });
  return `
    <div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--ink-15); font-size:11.5px;">
      <div style="font-weight:700; margin-bottom:6px; color:var(--ink-60);">تفاصيل الرصيد (بالترتيب):</div>
      ${rows.map(r => `
        <div style="display:flex; justify-content:space-between; gap:8px; padding:3px 0; color:var(--ink-60);">
          <span>${esc(r.label)}</span>
          <span class="num" style="white-space:nowrap;">${r.amount >= 0 && r.label.includes("افتتاحي") ? "" : (r.amount >= 0 ? "+" : "")}${money(r.amount)} <span style="color:var(--ink-40);">→ ${money(r.running)}</span></span>
        </div>
      `).join("")}
      ${rows.length === 1 ? `<div style="color:var(--ink-40); padding-top:4px;">مفيش أي معاملة أثرت على الرصيد في اليوم ده — الرصيد الحالي جاي بالكامل من الرصيد الافتتاحي.</div>` : ""}
    </div>
  `;
}

/* ✦ NEW: تفاصيل حساب رصيد مكينة فوري — لتتبع مصدر أي رقم غريب */
function toggleBalanceBreakdown(machineId) {
  state.balanceBreakdownMachineId = state.balanceBreakdownMachineId === machineId ? null : machineId;
  render();
}
function renderBalanceBreakdown(m) {
  const o = state.dayData.opening || emptyOpening();
  const openingVal = machineBalValue(o.machines?.[m.id], "مدفوعات");
  const rows = [];
  rows.push({ label: "الرصيد الافتتاحي (مدفوعات)", amount: openingVal, running: openingVal });
  let running = openingVal;
  (state.dayData.transactions || []).forEach(t => {
    if (t.machineId !== m.id) return;
    let delta = 0, label = "";
    if (t.category === "machine" && t.machineSub === "مدفوعات") { delta = -num(t.amount); label = `شحن مكن (مدفوعات) · ${t.time || ""}`; }
    else if (t.category === "machineDebt") { delta = num(t.debtMadfoat ?? t.amount ?? 0); label = `مديونية (المكن) - مدفوعات · ${t.time || ""}`; }
    else if (t.category === "fawrySettlement") {
      const before = running;
      const after = madfoatAfterSettlement(before, t.fawryPaidFromMadfoat || 0, t.fawryTopUpMadfoat || 0);
      delta = after - before;
      label = `تسوية فوري (مسدد ${money(num(t.fawryPaidFromMadfoat||0))} / زيادة ${money(num(t.fawryTopUpMadfoat||0))}) · ${t.time || ""}`;
    } else { return; }
    running += delta;
    rows.push({ label, amount: delta, running });
  });
  return `
    <div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--ink-15); font-size:11.5px;">
      <div style="font-weight:700; margin-bottom:6px; color:var(--ink-60);">تفاصيل رصيد "مدفوعات" (بالترتيب):</div>
      ${rows.map(r => `
        <div style="display:flex; justify-content:space-between; gap:8px; padding:3px 0; color:var(--ink-60);">
          <span>${esc(r.label)}</span>
          <span class="num" style="white-space:nowrap;">${r.amount >= 0 && r.label.includes("افتتاحي") ? "" : (r.amount >= 0 ? "+" : "")}${money(r.amount)} <span style="color:var(--ink-40);">→ ${money(r.running)}</span></span>
        </div>
      `).join("")}
      ${rows.length === 1 ? `<div style="color:var(--ink-40); padding-top:4px;">مفيش أي معاملة أثرت على "مدفوعات" في اليوم ده — الرصيد الحالي جاي بالكامل من الرصيد الافتتاحي.</div>` : ""}
    </div>
  `;
}

function islamCard(value) {
  const v = Number(value) || 0;
  const weOwe = v < 0;
  const abs = Math.abs(v);
  let statusLabel, color;
  if (Math.abs(v) < 0.01) { statusLabel = "متسوّى"; color = "var(--ink-60)"; }
  else if (weOwe) { statusLabel = "لإسلام عندنا"; color = "var(--rust)"; }
  else { statusLabel = "لينا عند إسلام"; color = "var(--emerald)"; }
  const display = state.balancesHidden ? "••••" : money(abs);
  return `
    <div class="balance-card" style="width:100%;">
      <div class="balance-card-top">${icon("user", {size:13, color:"var(--ink-40)"})}<div class="balance-card-label">حساب إسلام</div></div>
      <div style="display:flex; align-items:baseline; gap:8px;">
        <div class="balance-card-value num" style="color:${color};">${display}</div>
        <div style="font-size:12px; font-weight:700; color:${color};">${statusLabel}</div>
      </div>
    </div>
  `;
}

/* ✦ NEW: كارت مديونية المكن */
function machineDebtsCard(live) {
  const debts = state.machines
    .map(m => ({ id: m.id, name: m.name, val: num(live.machineDebts?.[m.id]), subs: machineSubs(m) ? (live.machineDebtSubs?.[m.id] || {}) : null }))
    .filter(x => Math.abs(x.val) >= 0.01);
  return `
    <div class="balance-card" style="width:100%;">
      <div class="balance-card-top">${icon("alert-triangle", {size:13, color:"var(--ink-40)"})}<div class="balance-card-label">مديونية المكن</div></div>
      ${debts.length === 0
        ? `<div style="font-size:13px; color:var(--ink-60); font-weight:600;">لا يوجد مديونيات للمكن</div>`
        : debts.map(x => `
            <div style="padding:3px 0;">
              <div style="display:flex; align-items:baseline; justify-content:space-between; gap:8px;">
                <div style="font-size:13px; font-weight:700; color:var(--ink);">${esc(x.name)}</div>
                <div class="num" style="font-size:14px; font-weight:700; color:var(--rust);">${state.balancesHidden ? "••••" : money(x.val)} مديونية</div>
              </div>
              ${x.subs ? `
                <div style="display:flex; justify-content:space-between; gap:8px; font-size:11.5px; color:var(--ink-60); margin-top:2px;">
                  <span>مدفوعات: <span class="num">${state.balancesHidden ? "••••" : money(num(x.subs["مدفوعات"]))}</span></span>
                  <span>خدمات موبايل: <span class="num">${state.balancesHidden ? "••••" : money(num(x.subs["خدمات موبايل"]))}</span></span>
                </div>
              ` : ""}
            </div>
          `).join("")
      }
    </div>
  `;
}

function renderTodayView(live) {
  const d = state.dayData;
  if (d.status === "not_started") {

  return `

    ${closed ? `
      <button id="pdf-download-btn" class="primary-btn" style="margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="downloadDayPDF(state.today, state.dayData)">

      </button>
      ${(canEdit() && !state.editingArchiveDay) ? `

        </div>
      </div>
    ` : ""}
  `;
}

function renderTxRow(tx, editable) {
  let iconName, color, title;
  if (tx.category === "vodafone") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    title = `فودافون كاش · ${tx.subtype} · ${esc(state.walletNames[tx.walletId] || tx.walletId)}`;
  } else if (tx.category === "instapay") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    /* ✦ اعرض اسم الحساب */
    const accName = getInstapayAccountName(tx.instapayAccountId);
    title = `انستاباي · ${tx.subtype} · ${esc(accName)}`;
  } else if (tx.category === "islam") {
    iconName = tx.subtype === "سحب" ? "arrow-up-circle" : "arrow-down-circle";
    color = tx.subtype === "سحب" ? "var(--steel)" : "var(--emerald)";
    title = `حساب إسلام · ${tx.subtype}`;
  } else if (tx.category === "expense") {
    iconName = "log-out"; color = "var(--rust)";
    title = `خوارج · ${esc(tx.destination || "—")}`;
  } else if (tx.category === "cash") {
    iconName = "banknote"; color = "var(--emerald)";
    title = `نقدية · ${esc(tx.destination || "—")}`;
  } else if (tx.category === "machineDebt") {
    const m = state.machines.find(mm => mm.id === tx.machineId);
    iconName = "alert-triangle"; color = "var(--rust)";
    const debtParts = [];
    if (num(tx.debtMadfoat) > 0) debtParts.push(`مدفوعات ${money(num(tx.debtMadfoat))}`);
    if (num(tx.debtKhadamat) > 0) debtParts.push(`خدمات موبايل ${money(num(tx.debtKhadamat))}`);
    title = `مديونية (المكن) · ${esc(m ? m.name : "—")}${debtParts.length ? " · " + esc(debtParts.join(" / ")) : ""}`;
  } else if (tx.category === "machineDebtPayment") {
    const m = state.machines.find(mm => mm.id === tx.machineId);
    iconName = "check-circle-2"; color = "var(--emerald)";
    title = `سداد مديونية (المكن) · ${esc(m ? m.name : "—")}`;
  } else if (tx.category === "fawrySettlement") {
    const m = state.machines.find(mm => mm.id === tx.machineId);
    iconName = "landmark"; color = "var(--gold)";
    const parts = [];
    if (num(tx.fawryPaidFromMadfoat) > 0) parts.push(`مسدد من المدفوعات ${money(num(tx.fawryPaidFromMadfoat))}`);
    if (num(tx.fawryPaidFromKhadamat) > 0) parts.push(`مسدد من خدمات موبايل ${money(num(tx.fawryPaidFromKhadamat))}`);
    if (num(tx.fawryPaidFromVisa) > 0) parts.push(`مدفوع للفيزا ${money(num(tx.fawryPaidFromVisa))}`);
    if (num(tx.fawryTopUpMadfoat) > 0) parts.push(`زيادة مدفوعات ${money(num(tx.fawryTopUpMadfoat))}`);
    if (num(tx.fawryTopUpKhadamat) > 0) parts.push(`زيادة خدمات موبايل ${money(num(tx.fawryTopUpKhadamat))}`);
    if (num(tx.fawryDebtReduction) > 0) parts.push(`سداد مديونية فوري (مدفوعات) ${money(num(tx.fawryDebtReduction))}`);
    if (num(tx.fawryDebtReductionKhadamat) > 0) parts.push(`سداد مديونية فوري (خدمات موبايل) ${money(num(tx.fawryDebtReductionKhadamat))}`);
    title = `تسوية فوري · ${esc(m ? m.name : "—")}${parts.length ? " · " + esc(parts.join(" / ")) : ""}`;
  } else {
    const m = state.machines.find(m=>m.id===tx.machineId);
    if (tx.machineSub === "فيزا") { iconName = "arrow-up-circle"; color = "var(--steel)"; }
    else { iconName = "zap"; color = "var(--gold)"; }
    title = `شحن مكن · ${esc(m ? m.name : "—")}${tx.machineSub ? " · " + esc(tx.machineSub) : ""}`;
  }
  const comm = num(tx.commission);
  return `
    <div class="tx-row">
      <div class="tx-row-icon" style="background: ${tint15(color)};">
        ${icon(iconName, {size:16, color})}
      </div>
      <div class="tx-row-body">
        <div class="tx-row-title">${title}</div>
        <div class="tx-row-sub">${tx.time}${tx.createdBy ? ` · ${esc(tx.createdBy)}` : ""}${tx.note ? ` · ${esc(tx.note)}` : ""}</div>
      </div>
      <div class="tx-row-amt">
        <div class="tx-row-amt-val num">${money(tx.amount)}</div>
        ${num(tx.profit) > 0 ? `<div class="tx-row-profit num">+${money(tx.profit)} مكسب</div>` : ""}
        ${comm > 0 ? `<div class="tx-row-commission num">-${money(comm)} عمولة</div>` : ""}
      </div>
      ${editable ? `
        <div class="tx-row-actions">
          <button class="icon-btn" onclick="openTxSheet('${tx.id}')">${icon("pencil",{size:14,color:"var(--ink-40)"})}</button>
          <button class="icon-btn" onclick="confirmDeleteTx('${tx.id}')">${icon("trash-2",{size:14,color:"var(--rust)"})}</button>
        </div>
      ` : ""}
    </div>
  `;
}

/* ✦ Helper: اسم حساب انستاباي */
function getInstapayAccountName(id) {
  if (!id) return "انستاباي";
  const acc = (state.instapayAccounts || []).find(a => a.id === id);
  return acc ? acc.name : "انستاباي";
}

function renderClosedStamp(closing, live, closedBy) {
  const ipAccounts = state.instapayAccounts || DEFAULT_INSTAPAY_ACCOUNTS;
  const ipDiffs = ipAccounts.map(acc => num(closing.instapayAccounts?.[acc.id] ?? closing.instapay ?? 0) - num(live.instapayAccounts?.[acc.id] ?? 0));
  const machineDiffs = state.machines.map(m => {
    const subs = machineSubs(m);
    if (subs) return subs.map(s => machineBalValue(closing.machines?.[m.id], s) - machineBalValue(live.machines?.[m.id], s));
    return [machineBalValue(closing.machines?.[m.id]) - machineBalValue(live.machines?.[m.id])];
  }).flat();
  const machineDebtDiffs = state.machines.map(m => num(closing.machineDebts?.[m.id] ?? 0) - num(live.machineDebts?.[m.id]));
  const diffs = [
    num(closing.drawer) - live.drawer,
    num(closing.machineDrawer) - live.machineDrawer,
    ...WALLET_IDS.map(id => num(closing.wallets?.[id]) - live.wallets[id]),
    ...ipDiffs,
    ...machineDiffs,
    ...machineDebtDiffs,
    num(closing.islamBalance) - live.islamBalance,
  ];
  const matched = diffs.every(d => Math.abs(d) < 0.01);
  const totalDiff = diffs.reduce((a,b)=>a+b, 0);
  const c = matched ? "var(--emerald)" : "var(--rust)";
  return `
    <div class="closed-stamp" style="border:2px dashed ${c};">
      <div class="closed-stamp-badge" style="border:2px solid ${c}; color:${c};">
        ${icon(matched ? "check-circle-2" : "alert-triangle", {size:17})}
        ${matched ? "مطابق" : "فيه فرق"}
      </div>
      <div class="closed-stamp-sub">اليوم مقفول${closedBy ? ` · بواسطة ${esc(closedBy)}` : ""}</div>
      ${!matched ? `<div class="closed-stamp-diff">إجمالي الفرق: <span class="num" style="font-weight:700;color:var(--rust);">${money(totalDiff)}</span> ج.م</div>` : ""}
    </div>
  `;
}

async function downloadDayPDF(dayKey, dayData) {
  if (!dayData) return;
  if (typeof html2canvas === "undefined" || !window.jspdf) {
    alert("تعذر تحميل أدوات إنشاء الـ PDF. تأكد من اتصالك بالإنترنت وحاول تاني.");
    return;
  }
  const btn = document.getElementById("pdf-download-btn");
  const btnOriginal = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = `${icon("loader-2",{size:16,color:"currentColor",style:"animation:spin 1s linear infinite;"})} جاري التجهيز...`; }
  try {
    const live = computeLive(dayData);
    const profitTotal = (dayData.transactions || []).reduce((a,t)=>a+num(t.profit), 0);
    const commissionTotal = (dayData.transactions || []).reduce((a,t)=>a+num(t.commission), 0);
    const txs = [...(dayData.transactions || [])].reverse();
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:fixed; top:0; left:-99999px; width:800px; background:#ffffff;";
    wrap.innerHTML = buildReportHtml(dayKey, dayData, live, profitTotal, commissionTotal, txs);
    document.body.appendChild(wrap);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pageWidthMm = 210, pageHeightMm = 297, marginMm = 0;
    const usableWidthMm = pageWidthMm - marginMm * 2;
    const usableHeightMm = pageHeightMm - marginMm * 2;

    // ✦ نلف كل "صفحة" (بلوك بعرض ثابت) في عنصر منفصل ونصوّرها لوحدها لضمان نص عربي واضح وحدود صفحات نظيفة
    const pages = wrap.querySelectorAll(".pdf-page");
    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], { scale: 2.2, backgroundColor: "#ffffff", useCORS: true });
      const imgData = canvas.toDataURL("image/png");
      const imgHeightMm = canvas.height * usableWidthMm / canvas.width;
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, "PNG", marginMm, marginMm, usableWidthMm, Math.min(imgHeightMm, usableHeightMm));
    }
    document.body.removeChild(wrap);
    pdf.save(`تقرير-${dayKey}.pdf`);
  } catch (e) {
    console.error(e); alert("حصل خطأ أثناء إنشاء الـ PDF.");
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = btnOriginal; }
  }
}

  const tableStyle = "width:100%; border-collapse:collapse; font-size:12px;";

/* ===============================================================
   Start Day Sheet
   =============================================================== */
function openStartSheet() { if (!requireEdit()) return; state.sheet = "start"; render(); }

function confirmStartNewDay() {
  if (!requireEdit()) return;
  if (state.dayData.status === "not_started") { openStartSheet(); return; }
  if (state.dayData.status === "closed") {
    // ✦ اليوم مقفول بالفعل — ابدأ يوم شغل جديد بتاريخ النهاردة الحقيقي، من غير أي مسح لبيانات اليوم المقفول
    const closedKey = state.today;
    const freshKey = dateKey(new Date());
    const nextKey = freshKey !== closedKey ? freshKey : (closedKey + "-r" + Date.now()); // احتياطي نادر لو نفس التاريخ التقويمي
    if (!confirm("هيتم بدء يوم شغل جديد. بيانات اليوم المقفول الحالي هتفضل محفوظة زي ما هي في الأرشيف. متأكد؟")) return;
    state.today = nextKey;
    saveCurrentDayKey(nextKey);
    state.dayReady = false;
    attachDayListener(0);
    state.dayData = emptyDay();
    persistDay(state.today, state.dayData);
    state.tab = "today"; state.sheet = null;
    openStartSheet();
    return;
  }
  // اليوم لسه مفتوح (مش مقفول) — ده تصحيح غلطة على نفس اليوم
  if (!confirm("اليوم لسه مفتوح وفيه معاملات مسجلة. بدء يوم جديد هيمسح كل بيانات اليوم الحالي. متأكد؟")) return;
  if (db && (state.dayData.transactions || []).length > 0) {
    db.collection("days_backup").doc(state.today + "__" + Date.now()).set(state.dayData)
      .catch(err => console.error("backup before reset failed", err));
  }
  state.dayData = emptyDay();
  persistDay(state.today, state.dayData);
  state.tab = "today"; state.sheet = null;
  openStartSheet();
}

function reopenDay() {
  if (!requireEdit()) return;
  if (state.dayData.status !== "closed") return;
  if (!confirm("هيتم إعادة فتح اليوم عشان تقدر تضيف أو تعدّل معاملات فيه تاني. لما تخلّص تقدر تقفله تاني عادي. متأكد؟")) return;
  state.dayData = { ...state.dayData, status: "open" };
  persistDay(state.today, state.dayData);
  render();
}

function fawrySettlementPreviewText(f) {
  const paid = num(f.fawryPaidFromMadfoat);
  const khadamatPaid = num(f.fawryPaidFromKhadamat); // ✦ NEW
  const visa = num(f.fawryPaidFromVisa);
  const topUp = num(f.fawryTopUpMadfoat);
  const khadamatTopUp = num(f.fawryTopUpKhadamat); // ✦ NEW
  if (!paid && !khadamatPaid && !visa && !topUp && !khadamatTopUp) return "هيتأثر الدرج (كاش) حسب المبالغ اللي هتكتبها فوق.";
  const netChange = -paid - khadamatPaid + visa - topUp - khadamatTopUp;
  const sign = netChange > 0 ? "+" : "";
  return `الدرج (كاش) هيتغيّر بمقدار: <span class="num" style="font-weight:700;color:${netChange<0?'var(--rust)':'var(--emerald)'};">${sign}${money(netChange)}</span> ج.م`;
}

  const curFawryDebt = num(live.machineDebts?.[f.debtMachineId]);
  const paid = num(f.fawryPaidFromMadfoat);
  if (curFawryDebt <= 0.005 || paid <= 0) return "";
  const reduceAmount = Math.min(paid, curFawryDebt);
  const checked = f.fawryReduceDebt !== false; // افتراضيًا مفعّل
  return `
    <label style="display:flex; align-items:flex-start; gap:8px; margin-top:8px; font-size:12.5px; color:var(--ink-60); cursor:pointer;">
      <input type="checkbox" id="fs-reduce-debt" style="margin-top:2px;" ${checked ? "checked" : ""} onchange="toggleFawryReduceDebt()">
      <span>هل تريد إزالة مديونية فوري بقيمة <span class="num" style="font-weight:700; color:var(--ink);">${money(reduceAmount)}</span> ج.م؟</span>
    </label>
  `;
}
function toggleFawryReduceDebt() {
  const el = document.getElementById("fs-reduce-debt");
  state.txForm.fawryReduceDebt = el ? el.checked : true;
}

/* ✦ NEW: نفس فكرة fawryDebtLinkHtml بالظبط لكن لخدمات موبايل */

/* ✦ NEW: حساب رصيد "مدفوعات" بعد السداد — بيتحرك ناحية الصفر بمقدار المسدد (ويكمل لو عدّى الصفر)، ثم تُضاف الزيادة */
function madfoatAfterSettlement(before, paid, topUp) {
  const afterPayment = before < 0 ? (before + num(paid)) : (before - num(paid));
  return afterPayment + num(topUp);
}

function updateFawrySettlementPreview() {
  const f = state.txForm;
  const get = id => { const el = document.getElementById(id); return el ? el.value : ""; };
  f.fawryPaidFromMadfoat = get("fs-madfoat");
  f.fawryPaidFromKhadamat = get("fs-khadamat"); // ✦ NEW
  f.fawryPaidFromVisa = get("fs-visa");
  f.fawryTopUpMadfoat = get("fs-topup");
  f.fawryTopUpKhadamat = get("fs-topup-khadamat"); // ✦ NEW
  const out = document.getElementById("fawry-settlement-preview");
  if (out) out.innerHTML = fawrySettlementPreviewText(f);

  const linkWrapKhadamat = document.getElementById("fawry-debt-link-wrap-khadamat"); // ✦ NEW

  // ✦ تحديث لحظي لكل خانة على حدة

  const curMadfoat = machineBalValue(live.machines?.[f.debtMachineId], "مدفوعات");
  const curKhadamat = machineBalValue(live.machines?.[f.debtMachineId], "خدمات موبايل"); // ✦ NEW
  const curVisa = machineBalValue(live.machines?.[f.debtMachineId], "فيزا");
  const madfoatHintEl = document.getElementById("fs-madfoat-hint");
  if (madfoatHintEl) {
    madfoatHintEl.innerHTML = f.fawryPaidFromMadfoat !== ""
      ? `رصيد المدفوعات هيبقى: <span class="num" style="font-weight:700;">${money(madfoatAfterSettlement(curMadfoat, f.fawryPaidFromMadfoat, f.fawryTopUpMadfoat))}</span> ج.م` : "";
  }
  const khadamatHintEl = document.getElementById("fs-khadamat-hint"); // ✦ NEW
  if (khadamatHintEl) {
    khadamatHintEl.innerHTML = f.fawryPaidFromKhadamat !== ""
      ? `رصيد خدمات موبايل هيبقى: <span class="num" style="font-weight:700;">${money(madfoatAfterSettlement(curKhadamat, f.fawryPaidFromKhadamat, f.fawryTopUpKhadamat))}</span> ج.م` : "";
  }
  liveBalanceHint("fs-visa", "fs-visa-hint", curVisa, -1, "متبقي في الفيزا");
  const topupHintEl = document.getElementById("fs-topup-hint");
  if (topupHintEl) {
    topupHintEl.innerHTML = f.fawryTopUpMadfoat !== ""
      ? `رصيد المدفوعات هيبقى: <span class="num" style="font-weight:700;">${money(madfoatAfterSettlement(curMadfoat, f.fawryPaidFromMadfoat, f.fawryTopUpMadfoat))}</span> ج.م` : "";
  }
  const topupKhadamatHintEl = document.getElementById("fs-topup-khadamat-hint"); // ✦ NEW
  if (topupKhadamatHintEl) {
    topupKhadamatHintEl.innerHTML = f.fawryTopUpKhadamat !== ""
      ? `رصيد خدمات موبايل هيبقى: <span class="num" style="font-weight:700;">${money(madfoatAfterSettlement(curKhadamat, f.fawryPaidFromKhadamat, f.fawryTopUpKhadamat))}</span> ج.م` : "";
  }
}

/* ✦ NEW: تحديث لحظي عام للمتبقي/الناتج تحت أي خانة رقم بتأثر على رصيد معين
   base: الرصيد الحالي قبل التعديل
   sign: +1 لو الخانة بتزود الرصيد، -1 لو بتقلله
   label: النص قبل الرقم (افتراضيًا "الناتج") */
function liveBalanceHint(inputId, outId, base, sign, label) {
  const el = document.getElementById(inputId);
  const out = document.getElementById(outId);
  if (!el || !out) return;
  const val = el.value;
  if (val === "") { out.innerHTML = ""; return; }
  const result = base + sign * num(val);
  out.innerHTML = `${label || "الناتج"}: <span class="num" style="font-weight:700;">${money(result)}</span> ج.م`;
}

/* ✦ سداد مديونية مكينة: المتبقي = المديونية الحالية - المبلغ المدفوع */
function updateDebtPaymentRemaining(curDebt) {
  liveBalanceHint("tx-amount", "debt-payment-remaining", curDebt, -1, "متبقي");
}

/* ✦ NEW: نسخة عامة تُستخدم مباشرة من oninput مع تمرير base/sign/label */
function updateGenericHint(inputId, outId, base, sign, label) {
  liveBalanceHint(inputId, outId, base, sign, label);
}

/* ✦ فودافون كاش: تحديث رصيد المحفظة اللحظي (بيراعي المبلغ والعمولة سوا) */
function updateWalletHint(curWallet) {
  const f = state.txForm;
  const amtEl = document.getElementById("tx-amount");
  const commEl = document.getElementById("tx-commission");
  const out = document.getElementById("tx-wallet-hint");
  if (!out) return;
  const amtVal = amtEl ? amtEl.value : "";
  const commVal = commEl ? commEl.value : "";
  if (amtVal === "" && commVal === "") { out.innerHTML = ""; return; }
  const isDeposit = f.subtype === "إيداع";
  const result = isDeposit ? (curWallet - num(amtVal) - num(commVal)) : (curWallet + num(amtVal));
  out.innerHTML = `رصيد ${esc(state.walletNames[f.walletId])} هيبقى: <span class="num" style="font-weight:700;">${money(result)}</span> ج.م`;
}
